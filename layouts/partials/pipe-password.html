<div id="locked" style="text-align:center;padding:60px 20px;">
  <h3>🔒 需要密码</h3>
  <input type="password" id="pwd" placeholder="请输入密码" style="padding:10px 16px;border-radius:10px;border:1px solid #ccc;font-size:16px;margin:8px;width:200px;">
  <button onclick="unlock()" style="padding:10px 24px;border-radius:10px;background:var(--accent-color,#007AFF);color:#fff;border:none;font-size:16px;cursor:pointer;">确认</button>
  <p id="err" style="color:red;margin-top:8px;display:none;">密码错误</p>
</div>
<div id="protected" style="display:none;">

<script>
const PWD_HASH = 'fb54d0d541768b783ecbe1c5f79ad3f5a3f4ebbbcbe2bf958dfe806d1c2ca0bd';
async function sha256(s) {
  const buf = new TextEncoder().encode(s);
  const hash = await crypto.subtle.digest('SHA-256', buf);
  return Array.from(new Uint8Array(hash)).map(b => b.toString(16).padStart(2, '0')).join('');
}
async function unlock() {
  const h = await sha256(document.getElementById('pwd').value);
  if (h === PWD_HASH) {
    document.getElementById('locked').style.display = 'none';
    document.getElementById('protected').style.display = 'block';
    sessionStorage.setItem('pipe_ok', '1');
  } else {
    document.getElementById('err').style.display = 'block';
  }
}
if (sessionStorage.getItem('pipe_ok') === '1') {
  (function(){
    var l = document.getElementById('locked');
    var p = document.getElementById('protected');
    if(l && p) { l.style.display = 'none'; p.style.display = 'block'; }
  })();
}
</script>
