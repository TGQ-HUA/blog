{{ partial "sidebar/widgets" . }}
<div id="auth-sidebar" style="margin-top:16px;padding:16px;background:var(--glass-bg);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border:1px solid var(--glass-border);border-radius:16px">
    <div id="auth-logged-out" style="text-align:center">
        <p style="font-size:13px;color:#6b7280;margin:0 0 10px">登录后查看文章</p>
        <a href="/login/" style="display:inline-block;padding:8px 20px;background:var(--accent-color);color:#fff;border-radius:10px;text-decoration:none;font-size:14px;font-weight:600">登录</a>
    </div>
    <div id="auth-logged-in" style="display:none;text-align:center">
        <p style="font-size:13px;color:#374151;margin:0"><span id="auth-sidebar-email"></span></p>
        <a href="#" onclick="logoutSidebar();return false" style="font-size:12px;color:#6b7280;text-decoration:none">退出</a>
    </div>
</div>
<script>
fetch('https://tangguoqi.top/auth/me',{credentials:'include'}).then(r=>r.json()).then(d=>{
    if(d.user){
        document.getElementById('auth-logged-out').style.display='none';
        document.getElementById('auth-logged-in').style.display='block';
        document.getElementById('auth-sidebar-email').textContent=d.user.email;
    }
});
function logoutSidebar(){
    fetch('https://tangguoqi.top/auth/logout',{method:'POST',credentials:'include'}).then(()=>location.reload());
}
</script>
