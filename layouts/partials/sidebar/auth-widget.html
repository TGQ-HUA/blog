<div id="auth-bar" style="max-width:800px;margin:2em auto;padding:20px 24px;background:var(--glass-bg);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border:1px solid var(--glass-border);border-radius:16px;display:flex;align-items:center;justify-content:space-between;gap:16px">
    <div id="auth-bar-out" style="display:flex;align-items:center;gap:12px;width:100%;justify-content:space-between">
        <span style="font-size:14px;color:#6b7280">登录后查看全部技术文章</span>
        <a href="/login/" style="flex-shrink:0;padding:8px 20px;background:var(--accent-color);color:#fff;border-radius:10px;text-decoration:none;font-size:14px;font-weight:600">登录 / 注册</a>
    </div>
    <div id="auth-bar-in" style="display:none;align-items:center;gap:12px;width:100%;justify-content:space-between">
        <span style="font-size:14px;color:#10b981">✓ 已登录</span>
        <span style="font-size:13px;color:#374151" id="auth-bar-email"></span>
        <a href="#" onclick="document.cookie='session=;Max-Age=0;path=/';location.reload();return false" style="font-size:12px;color:#9ca3af;text-decoration:none;flex-shrink:0">退出</a>
    </div>
</div>
<script>
(function(){
    fetch('https://tangguoqi.top/auth/me',{credentials:'include'})
    .then(r=>r.json()).then(d=>{
        if(d.user){
            document.getElementById('auth-bar-out').style.display='none';
            document.getElementById('auth-bar-in').style.display='flex';
            document.getElementById('auth-bar-email').textContent=d.user.email;
        }
    });
})();
</script>
