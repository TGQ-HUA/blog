<!-- 评论组件 -->
<div id="comments-section" style="margin:2em 0">
    <h3 style="color:var(--accent-color);margin-bottom:16px">评论</h3>

    <!-- 评论列表 -->
    <div id="comments-list" style="margin-bottom:20px"></div>

    <!-- 评论表单（需登录） -->
    <div id="comment-form-wrap" style="display:none">
        <textarea id="comment-content" placeholder="说点什么... (不超过500字)" maxlength="500" rows="4"
            style="width:100%;padding:12px;border:1px solid var(--glass-border);border-radius:12px;font-size:14px;resize:vertical;background:rgba(255,255,255,.6);box-sizing:border-box;font-family:inherit"></textarea>
        <div style="display:flex;align-items:center;justify-content:space-between;margin-top:8px">
            <span id="comment-count" style="font-size:12px;color:#9ca3af">0/500</span>
            <button id="comment-submit" onclick="submitComment()"
                style="padding:8px 20px;background:var(--accent-color);color:#fff;border:none;border-radius:10px;font-size:14px;font-weight:600;cursor:pointer">发布评论</button>
        </div>
        <p id="comment-msg" style="font-size:13px;margin-top:8px;min-height:20px"></p>
    </div>

    <div id="comment-login-hint" style="text-align:center;padding:16px;background:var(--glass-bg);border-radius:12px;border:1px solid var(--glass-border)">
        <a href="/login/" style="color:var(--accent-color);text-decoration:none;font-weight:600">登录</a> 后参与评论
    </div>
</div>

<script>
const API='https://tangguoqi.top/auth';
const SLUG='{{ .RelPermalink }}';

// 字数统计
document.addEventListener('DOMContentLoaded',()=>{
    const ta=document.getElementById('comment-content');
    const cnt=document.getElementById('comment-count');
    if(ta)ta.addEventListener('input',()=>{cnt.textContent=ta.value.length+'/500';});
});

// 检查登录状态
fetch(API+'/me',{credentials:'include'}).then(r=>r.json()).then(d=>{
    if(d.user){
        document.getElementById('comment-form-wrap').style.display='block';
        document.getElementById('comment-login-hint').style.display='none';
    }
});

// 加载评论
loadComments();

function loadComments(){
    fetch(API+'/comment?slug='+encodeURIComponent(SLUG),{credentials:'include'})
    .then(r=>r.json()).then(d=>{
        const list=document.getElementById('comments-list');
        if(!d.comments||d.comments.length===0){
            list.innerHTML='<p style="color:#9ca3af;font-size:14px;text-align:center">暂无评论，来说两句吧</p>';
            return;
        }
        list.innerHTML=d.comments.map(c=>`
            <div style="padding:14px 0;border-bottom:1px solid rgba(0,0,0,.06)">
                <div style="display:flex;align-items:center;gap:8px;margin-bottom:6px">
                    <span style="font-size:13px;color:#374151;font-weight:600">${esc(c.email)}</span>
                    <span style="font-size:11px;color:#9ca3af">${c.time}</span>
                </div>
                <p style="font-size:14px;color:#4b5563;margin:0;line-height:1.6">${esc(c.content)}</p>
            </div>
        `).join('');
    });
}

function submitComment(){
    const content=document.getElementById('comment-content').value.trim();
    const msg=document.getElementById('comment-msg');
    const btn=document.getElementById('comment-submit');
    if(!content){msg.textContent='请输入评论内容';msg.style.color='#dc2626';return;}
    if(content.length>500){msg.textContent='超过500字限制';msg.style.color='#dc2626';return;}

    msg.textContent='发布中...';msg.style.color='#6b7280';btn.disabled=true;
    fetch(API+'/comment',{
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify({slug:SLUG,content}),
        credentials:'include'
    }).then(r=>r.json()).then(d=>{
        btn.disabled=false;
        if(d.ok){
            msg.textContent='评论成功！';msg.style.color='#10b981';
            document.getElementById('comment-content').value='';
            document.getElementById('comment-count').textContent='0/500';
            loadComments();
        }else{
            msg.textContent=d.error||'发布失败';msg.style.color='#dc2626';
        }
    });
}

function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
</script>
