<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - 奇美星的技术博客</title>
    {{ partial "head.html" . }}
</head>
<body style="background:var(--body-background);display:flex;align-items:center;justify-content:center;min-height:100vh;margin:0;font-family:-apple-system,BlinkMacSystemFont,'PingFang SC','Microsoft YaHei',sans-serif">
    <div style="background:var(--glass-bg);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);border:1px solid var(--glass-border);border-radius:20px;padding:40px;max-width:420px;width:90%;box-shadow:var(--glass-shadow);text-align:center">
        <h2 style="margin:0 0 8px;color:var(--accent-color)">登录</h2>
        <p style="font-size:14px;color:#6b7280;margin:0 0 24px">输入邮箱，发送验证码登录</p>

        <div id="login-form">
            <input id="login-email" type="email" placeholder="your@email.com" style="width:100%;padding:12px 16px;border:1px solid var(--glass-border);border-radius:12px;font-size:15px;margin-bottom:12px;box-sizing:border-box;background:rgba(255,255,255,0.6);outline:none" />
            <button id="login-send" onclick="handleLogin()" style="width:100%;padding:12px;background:var(--accent-color);color:#fff;border:none;border-radius:12px;font-size:16px;font-weight:600;cursor:pointer">发送验证码</button>
            <p id="login-msg" style="font-size:13px;margin:12px 0 0;min-height:20px"></p>
            <div id="code-area" style="display:none">
                <input id="login-code" type="text" placeholder="输入6位验证码" maxlength="6" style="width:100%;padding:12px 16px;border:1px solid var(--glass-border);border-radius:12px;font-size:20px;margin:12px 0;box-sizing:border-box;text-align:center;letter-spacing:6px;background:rgba(255,255,255,0.6);outline:none" />
                <button onclick="handleVerify()" style="width:100%;padding:12px;background:#10b981;color:#fff;border:none;border-radius:12px;font-size:16px;font-weight:600;cursor:pointer">验证登录</button>
            </div>
        </div>

        <div id="login-done" style="display:none">
            <div style="font-size:48px;margin:20px 0">✅</div>
            <p style="color:#10b981;font-weight:600">登录成功！</p>
            <p style="font-size:14px;color:#6b7280"><span id="done-email"></span></p>
            <a href="/" style="display:inline-block;margin-top:16px;padding:10px 24px;background:var(--accent-color);color:#fff;border-radius:12px;text-decoration:none;font-weight:600">进入博客</a>
        </div>
    </div>

    <script>
    const AUTH = 'https://tangguoqi.top/auth';
    let token = '';

    // 已登录直接显示完成
    fetch(AUTH+'/me',{credentials:'include'}).then(r=>r.json()).then(d=>{
        if(d.user){showDone(d.user.email);}
    });

    function handleLogin(){
        const email=document.getElementById('login-email').value;
        const m=document.getElementById('login-msg');
        const b=document.getElementById('login-send');
        if(!email){m.textContent='请输入邮箱';m.style.color='#dc2626';return;}
        m.textContent='发送中...';m.style.color='#6b7280';b.disabled=true;
        fetch(AUTH+'/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email}),credentials:'include'})
        .then(r=>r.json()).then(d=>{
            b.disabled=false;
            if(d.ok){token=d._t;m.textContent='验证码已发送，请查收邮件';m.style.color='#10b981';document.getElementById('code-area').style.display='block';}
            else{m.textContent=d.error||'失败';m.style.color='#dc2626';}
        });
    }

    function handleVerify(){
        const code=document.getElementById('login-code').value;
        const m=document.getElementById('login-msg');
        fetch(AUTH+'/verify?token='+code+'&t='+token,{credentials:'include'})
        .then(r=>r.json()).then(d=>{
            if(d.ok){showDone(d.email);}
            else{m.textContent=d.error||'验证失败';m.style.color='#dc2626';}
        });
    }

    function showDone(email){
        document.getElementById('login-form').style.display='none';
        document.getElementById('login-done').style.display='block';
        document.getElementById('done-email').textContent=email;
        // 重定向回之前页面
        const back=localStorage.getItem('auth_back')||'/';
        localStorage.removeItem('auth_back');
        setTimeout(()=>location.href=back,1500);
    }
    </script>
</body>
</html>
