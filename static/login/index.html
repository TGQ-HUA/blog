<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - 奇美星的技术博客</title>
    <style>
        :root {
            --accent-color: #007AFF;
            --body-bg: #f2f2f7;
            --glass-bg: rgba(255,255,255,0.4);
            --glass-border: rgba(255,255,255,0.45);
            --glass-shadow: 0 4px 24px rgba(0,0,0,.06);
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            background: var(--body-bg);
            display:flex; align-items:center; justify-content:center;
            min-height:100vh; font-family:-apple-system,BlinkMacSystemFont,'PingFang SC','Microsoft YaHei',sans-serif;
        }
        body::before {
            content:''; position:fixed; top:0;left:0;right:0;bottom:0;
            background:radial-gradient(ellipse at 20% 20%, rgba(0,122,255,.1) 0%, transparent 50%),
                       radial-gradient(ellipse at 80% 80%, rgba(88,86,214,.08) 0%, transparent 50%);
            pointer-events:none; z-index:-1;
        }
        .card {
            background: var(--glass-bg);
            backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px);
            border: 1px solid var(--glass-border);
            border-radius: 20px; padding: 40px;
            max-width: 420px; width: 90%;
            box-shadow: var(--glass-shadow);
            text-align: center;
        }
        .card h2 { margin:0 0 8px; color:var(--accent-color); font-size:24px; }
        .card .sub { font-size:14px; color:#6b7280; margin:0 0 24px; }
        .card input {
            width:100%; padding:12px 16px; border:1px solid #e5e7eb;
            border-radius:12px; font-size:15px; margin-bottom:12px;
            background:rgba(255,255,255,.6); outline:none;
        }
        .card input:focus { border-color:var(--accent-color); box-shadow:0 0 0 3px rgba(0,122,255,.12); }
        .btn {
            width:100%; padding:12px; color:#fff; border:none;
            border-radius:12px; font-size:16px; font-weight:600; cursor:pointer;
        }
        .btn-primary { background:var(--accent-color); }
        .btn-success { background:#10b981; }
        .btn:disabled { opacity:.6; cursor:not-allowed; }
        .msg { font-size:13px; margin:12px 0 0; min-height:20px; }
        .done-icon { font-size:48px; margin:20px 0; }
    </style>
</head>
<body>
<div class="card">
    <h2>登录</h2>
    <p class="sub">输入邮箱，发送验证码登录</p>

    <div id="login-form">
        <input id="login-email" type="email" placeholder="your@email.com" />
        <button id="login-send" class="btn btn-primary" onclick="handleLogin()">发送验证码</button>
        <span id="login-countdown" style="display:none;font-size:13px;color:#6b7280;margin-left:8px"></span>
        <p class="msg" id="login-msg"></p>
        <div id="code-area" style="display:none">
            <input id="login-code" type="text" placeholder="输入6位验证码" maxlength="6" style="font-size:20px;text-align:center;letter-spacing:6px" />
            <button class="btn btn-success" onclick="handleVerify()">验证登录</button>
        </div>
    </div>

    <div id="login-done" style="display:none">
        <div class="done-icon">✅</div>
        <p style="color:#10b981;font-weight:600;font-size:18px">登录成功！</p>
        <p style="font-size:14px;color:#6b7280;margin:8px 0" id="done-email"></p>
        <a href="/" class="btn btn-primary" style="display:inline-block;text-decoration:none;margin-top:16px;width:auto;padding:10px 32px">进入博客</a>
    </div>
</div>

<script>
const AUTH='https://tangguoqi.top/auth';
let token='';

fetch(AUTH+'/me',{credentials:'include'}).then(r=>r.json()).then(d=>{
    if(d.user) showDone(d.user.email);
});

let cooldown=0;

function handleLogin(){
    if(cooldown>0)return;
    const e=document.getElementById('login-email').value;
    const m=document.getElementById('login-msg');
    const b=document.getElementById('login-send');
    const cd=document.getElementById('login-countdown');
    if(!e){m.textContent='请输入邮箱';m.style.color='#dc2626';return;}
    m.textContent='发送中...';m.style.color='#6b7280';b.disabled=true;
    fetch(AUTH+'/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email:e}),credentials:'include'})
    .then(r=>r.json()).then(d=>{
        b.disabled=false;
        if(d.ok){
            token=d._t;m.textContent='验证码已发送，请查收邮件';m.style.color='#10b981';
            document.getElementById('code-area').style.display='block';
            // 60秒冷却
            cooldown=60;cd.style.display='inline';cd.textContent=cooldown+'s';
            let timer=setInterval(()=>{
                cooldown--;cd.textContent=cooldown+'s';
                if(cooldown<=0){clearInterval(timer);cd.style.display='none';}
            },1000);
        }else{m.textContent=d.error||'失败';m.style.color='#dc2626';}
    });
}

function handleVerify(){
    const code=document.getElementById('login-code').value;
    const m=document.getElementById('login-msg');
    fetch(AUTH+'/verify?token='+code+'&t='+encodeURIComponent(token),{credentials:'include'})
    .then(r=>r.json()).then(d=>{
        if(d.ok) showDone(d.email);
        else{m.textContent=d.error||'验证失败';m.style.color='#dc2626';}
    });
}

function showDone(email){
    document.getElementById('login-form').style.display='none';
    document.getElementById('login-done').style.display='block';
    document.getElementById('done-email').textContent=email;
    const back=localStorage.getItem('auth_back')||'/';
    localStorage.removeItem('auth_back');
    setTimeout(()=>location.href=back,1500);
}
</script>
</body>
</html>
