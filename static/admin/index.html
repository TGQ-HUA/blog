<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>管理 - 用户列表</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'PingFang SC','Microsoft YaHei',sans-serif;background:#f2f2f7;padding:40px 20px}
h1{color:#007AFF;margin-bottom:8px}
.sub{color:#6b7280;font-size:14px;margin-bottom:24px}
table{width:100%;max-width:700px;border-collapse:collapse;background:#fff;border-radius:16px;overflow:hidden;box-shadow:0 2px 12px rgba(0,0,0,.06)}
th{background:#007AFF;color:#fff;padding:12px 16px;text-align:left;font-size:14px}
td{padding:12px 16px;border-bottom:1px solid #f3f4f6;font-size:14px}
tr:last-child td{border-bottom:none}
.loading{color:#9ca3af;text-align:center;padding:40px}
.error{color:#dc2626;text-align:center;padding:20px}
</style>
</head>
<body>
<h1>📊 登录用户</h1>
<p class="sub">管理密钥: <code>tang-admin-2026</code>（可修改 Worker 环境变量 ADMIN_KEY）</p>
<div id="app"><p class="loading">加载中...</p></div>
<script>
const API='https://tangguoqi.top/auth/admin/users?key=tang-admin-2026';
fetch(API).then(r=>r.json()).then(d=>{
    if(d.error){document.getElementById('app').innerHTML=`<p class="error">${d.error}</p>`;return;}
    if(!d.users||d.users.length===0){document.getElementById('app').innerHTML='<p class="loading">暂无登录记录</p>';return;}
    let html=`<table><thead><tr><th>邮箱</th><th>最后登录</th><th>登录次数</th></tr></thead><tbody>`;
    d.users.forEach(u=>{html+=`<tr><td>${u.email}</td><td>${u.last_login}</td><td>${u.times}</td></tr>`;});
    html+='</tbody></table>';
    document.getElementById('app').innerHTML=html;
});
</script>
</body>
</html>
