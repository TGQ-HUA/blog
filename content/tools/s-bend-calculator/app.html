<style>
.s-bend-app {
  display: flex;
  gap: 20px;
  font-family: -apple-system, "Microsoft YaHei", sans-serif;
  font-size: 14px;
}
.s-bend-app * { box-sizing: border-box; }

.s-bend-controls {
  width: 320px;
  flex-shrink: 0;
}
.s-bend-canvas-wrap {
  flex: 1;
  min-width: 0;
  background: #fff;
  border-radius: 12px;
  border: 1px solid #e5e7eb;
  padding: 12px;
  display: flex;
  align-items: center;
  justify-content: center;
}
[data-scheme="dark"] .s-bend-canvas-wrap {
  background: #1e293b;
  border-color: #334155;
}
.s-bend-canvas-wrap canvas {
  width: 100%;
  height: 100%;
  min-height: 420px;
}

/* 控件组 */
.ctrl-group {
  background: var(--card-background, #fff);
  border-radius: 10px;
  border: 1px solid #e5e7eb;
  padding: 14px;
  margin-bottom: 12px;
}
[data-scheme="dark"] .ctrl-group {
  border-color: #334155;
}
.ctrl-group h4 {
  margin: 0 0 10px;
  font-size: 13px;
  color: var(--accent-color, #2563eb);
  border-bottom: 1px solid #e5e7eb;
  padding-bottom: 6px;
}
[data-scheme="dark"] .ctrl-group h4 {
  border-bottom-color: #334155;
}
.ctrl-row {
  display: flex;
  align-items: center;
  margin-bottom: 8px;
  gap: 8px;
}
.ctrl-row:last-child { margin-bottom: 0; }
.ctrl-row label {
  width: 70px;
  flex-shrink: 0;
  font-size: 12px;
  color: #6b7280;
  text-align: right;
}
[data-scheme="dark"] .ctrl-row label { color: #9ca3af; }
.ctrl-row input, .ctrl-row select {
  flex: 1;
  height: 32px;
  border: 1px solid #d1d5db;
  border-radius: 6px;
  padding: 0 8px;
  font-size: 13px;
  background: #fff;
  color: #111;
}
[data-scheme="dark"] .ctrl-row input,
[data-scheme="dark"] .ctrl-row select {
  background: #0f172a;
  border-color: #475569;
  color: #e2e8f0;
}
.ctrl-row input:focus, .ctrl-row select:focus {
  outline: none;
  border-color: var(--accent-color, #2563eb);
  box-shadow: 0 0 0 2px rgba(37, 99, 235, 0.15);
}
.ctrl-row input:disabled {
  background: #f3f4f6;
  color: #9ca3af;
}
[data-scheme="dark"] .ctrl-row input:disabled {
  background: #1e293b;
  color: #4b5563;
}

/* 结果显示 */
.result-row {
  display: flex;
  align-items: center;
  margin-bottom: 6px;
  gap: 8px;
}
.result-row label {
  width: 70px;
  flex-shrink: 0;
  font-size: 12px;
  color: #6b7280;
  text-align: right;
}
.result-row .result-val {
  font-weight: 600;
  color: var(--accent-color, #2563eb);
  font-size: 14px;
}

/* 响应式 */
@media (max-width: 768px) {
  .s-bend-app {
    flex-direction: column;
  }
  .s-bend-controls {
    width: 100%;
  }
  .s-bend-canvas-wrap canvas {
    min-height: 300px;
  }
}
</style>

<div class="s-bend-app">
  <div class="s-bend-controls">
    <!-- S弯分段参数 -->
    <div class="ctrl-group">
      <h4>S弯参数</h4>
      <div class="ctrl-row">
        <label>分段方式：</label>
        <select id="sb-mode">
          <option value="straight">菱角</option>
          <option value="arc" selected>弧形</option>
        </select>
      </div>
      <div class="ctrl-row">
        <label>分段数量：</label>
        <select id="sb-segments">
          <option value="2">两节</option>
          <option value="3" selected>三节</option>
        </select>
      </div>
      <div class="ctrl-row">
        <label>管宽：</label>
        <input type="number" id="sb-width" value="1200" min="100" step="50">
      </div>
      <div class="ctrl-row">
        <label>长度：</label>
        <input type="number" id="sb-length" value="2000" min="100" step="50">
      </div>
      <div class="ctrl-row">
        <label>偏移量：</label>
        <input type="number" id="sb-offset" value="700" min="50" step="50">
      </div>
      <div class="ctrl-row">
        <label>默认直位：</label>
        <input type="number" id="sb-straight" value="50" min="0" step="10">
      </div>
    </div>

    <!-- 左边弯头 -->
    <div class="ctrl-group">
      <h4>左边弯头</h4>
      <div class="ctrl-row">
        <label>直位 1：</label>
        <input type="number" id="sb-l-s1" value="50" min="0" step="10">
      </div>
      <div class="ctrl-row">
        <label>直位 2：</label>
        <input type="number" id="sb-l-s2" value="50" min="0" step="10">
      </div>
    </div>

    <!-- 右边弯头 -->
    <div class="ctrl-group">
      <h4>右边弯头</h4>
      <div class="ctrl-row">
        <label>直位 1：</label>
        <input type="number" id="sb-r-s1" value="50" min="0" step="10">
      </div>
      <div class="ctrl-row">
        <label>直位 2：</label>
        <input type="number" id="sb-r-s2" value="50" min="0" step="10">
      </div>
    </div>

    <!-- 中间短节 -->
    <div class="ctrl-group">
      <h4>中间短节</h4>
      <div class="ctrl-row">
        <label>短节长度：</label>
        <input type="number" id="sb-mid" value="500" min="0" step="50">
      </div>
    </div>

    <!-- 计算结果 -->
    <div class="ctrl-group">
      <h4>计算结果</h4>
      <div class="result-row">
        <label>弯头角度：</label>
        <span class="result-val" id="res-angle">--</span>
      </div>
      <div class="result-row">
        <label>弯头内径：</label>
        <span class="result-val" id="res-radius">--</span>
      </div>
    </div>
  </div>

  <div class="s-bend-canvas-wrap">
    <canvas id="sb-canvas"></canvas>
  </div>
</div>

<script>
(function() {
  'use strict';

  // ========== 获取 DOM 元素 ==========
  const canvas = document.getElementById('sb-canvas');
  const ctx = canvas.getContext('2d');

  const elMode = document.getElementById('sb-mode');
  const elSegments = document.getElementById('sb-segments');
  const elWidth = document.getElementById('sb-width');
  const elLength = document.getElementById('sb-length');
  const elOffset = document.getElementById('sb-offset');
  const elStraight = document.getElementById('sb-straight');
  const elLS1 = document.getElementById('sb-l-s1');
  const elLS2 = document.getElementById('sb-l-s2');
  const elRS1 = document.getElementById('sb-r-s1');
  const elRS2 = document.getElementById('sb-r-s2');
  const elMid = document.getElementById('sb-mid');
  const elAngle = document.getElementById('res-angle');
  const elRadius = document.getElementById('res-radius');

  // ========== 核心计算函数 ==========

  // S弯分段求值（弧形模式）
  // 输入: 长度, 偏位, 管宽, 短节总长
  // 输出: { 内径, 角度 } 或 null
  function calcArcMode(len, offset, width, shortTotal) {
    if (offset <= 0) return null;
    const S = (len * len + offset * offset - shortTotal * shortTotal) / (2 * offset);
    if (S <= 0) return null;
    const radius = (S - width) / 2;
    if (radius <= 0) return null;
    const denom = S * S + shortTotal * shortTotal;
    if (denom <= 0) return null;
    const cosPhi = (S * len + shortTotal * (offset - S)) / denom;
    const sinPhi = (shortTotal * len - S * (offset - S)) / denom;
    const angle = Math.atan2(cosPhi, sinPhi) * 180 / Math.PI;
    return { radius, angle };
  }

  // S弯内径归零求短节（直缝模式）
  // 输入: 长度, 偏位, 管宽
  // 输出: { 短节, 角度 } 或 null
  function calcStraightMode(len, offset, width) {
    if (offset <= 0 || width <= 0 || len <= 0) return null;
    const S = width;
    const denom1 = len * len + offset * offset - 2 * S * offset;
    if (denom1 <= 0) return null;
    const shortTotal = Math.sqrt(denom1);
    const denom2 = S * S + shortTotal * shortTotal;
    if (denom2 <= 0) return null;
    const cosPhi = (S * len + shortTotal * (offset - S)) / denom2;
    const sinPhi = (shortTotal * len - S * (offset - S)) / denom2;
    const angle = Math.atan2(cosPhi, sinPhi) * 180 / Math.PI;
    return { shortTotal, angle };
  }

  // ========== 绘图函数 ==========

  function rotatePoint(cx, cy, x, y, angleDeg) {
    const rad = angleDeg * Math.PI / 180;
    const cos = Math.cos(rad);
    const sin = Math.sin(rad);
    const dx = x - cx;
    const dy = y - cy;
    return {
      x: cx + dx * cos - dy * sin,
      y: cy + dx * sin + dy * cos
    };
  }

  function drawDimension(x1, y1, x2, y2, text, offsetPx) {
    const dx = x2 - x1;
    const dy = y2 - y1;
    const len = Math.sqrt(dx * dx + dy * dy);
    if (len < 2) return;

    // 法线方向偏移（左手法则：正值在行进方向左侧）
    const nx = dy / len * offsetPx;
    const ny = -dx / len * offsetPx;

    const ax = x1 + nx, ay = y1 + ny;
    const bx = x2 + nx, by = y2 + ny;

    ctx.save();
    ctx.strokeStyle = '#2563eb';
    ctx.fillStyle = '#2563eb';
    ctx.lineWidth = 0.8;
    ctx.setLineDash([]);

    // 延伸线
    ctx.beginPath();
    ctx.moveTo(x1, y1); ctx.lineTo(ax, ay);
    ctx.moveTo(x2, y2); ctx.lineTo(bx, by);
    ctx.stroke();

    // 尺寸线
    ctx.beginPath();
    ctx.moveTo(ax, ay); ctx.lineTo(bx, by);
    ctx.stroke();

    // 箭头
    const arrowSize = 5;
    const angle = Math.atan2(by - ay, bx - ax);
    ctx.beginPath();
    ctx.moveTo(ax, ay);
    ctx.lineTo(ax + arrowSize * Math.cos(angle - 0.4), ay + arrowSize * Math.sin(angle - 0.4));
    ctx.lineTo(ax + arrowSize * Math.cos(angle + 0.4), ay + arrowSize * Math.sin(angle + 0.4));
    ctx.fill();
    ctx.beginPath();
    ctx.moveTo(bx, by);
    ctx.lineTo(bx - arrowSize * Math.cos(angle - 0.4), by - arrowSize * Math.sin(angle - 0.4));
    ctx.lineTo(bx - arrowSize * Math.cos(angle + 0.4), by - arrowSize * Math.sin(angle + 0.4));
    ctx.fill();

    // 文字
    const mx = (ax + bx) / 2;
    const my = (ay + by) / 2;
    ctx.font = '11px "Microsoft YaHei", sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'bottom';

    ctx.save();
    ctx.translate(mx, my);
    let textAngle = Math.atan2(dy, dx);
    if (textAngle > Math.PI / 2 || textAngle < -Math.PI / 2) textAngle += Math.PI;
    ctx.rotate(textAngle);
    // 背景
    const tw = ctx.measureText(text).width + 4;
    ctx.fillStyle = 'rgba(255,255,255,0.85)';
    ctx.fillRect(-tw / 2, -14, tw, 14);
    ctx.fillStyle = '#2563eb';
    ctx.fillText(text, 0, -2);
    ctx.restore();

    ctx.restore();
  }

  function drawArc(cx, cy, startX, startY, angleDeg, scale) {
    const r = Math.sqrt((startX - cx) * (startX - cx) + (startY - cy) * (startY - cy));
    const startAngle = Math.atan2(startY - cy, startX - cx);
    const endAngle = startAngle + (angleDeg * Math.PI / 180);

    ctx.beginPath();
    if (angleDeg < 0) {
      ctx.arc(cx, cy, r, endAngle, startAngle, false);
    } else {
      ctx.arc(cx, cy, r, startAngle, endAngle, false);
    }
    ctx.stroke();

    // 返回终点
    return {
      x: cx + r * Math.cos(endAngle),
      y: cy + r * Math.sin(endAngle)
    };
  }

  function drawAngleAnnotation(line1Start, line1End, line2Start, line2End, radiusOffset, angle) {
    // 1. 计算两条线段的交点
    const a1 = line1End.y - line1Start.y;
    const b1 = line1Start.x - line1End.x;
    const c1 = a1 * line1Start.x + b1 * line1Start.y;

    const a2 = line2End.y - line2Start.y;
    const b2 = line2Start.x - line2End.x;
    const c2 = a2 * line2Start.x + b2 * line2Start.y;

    const det = a1 * b2 - a2 * b1;
    if (Math.abs(det) < 1e-9) return;

    const ix = (b2 * c1 - b1 * c2) / det;
    const iy = (a1 * c2 - a2 * c1) / det;

    // 2. 计算圆弧半径 = 到起点距离 + 偏移
    const distToStart = Math.sqrt((line1Start.x - ix) * (line1Start.x - ix) + (line1Start.y - iy) * (line1Start.y - iy));
    const arcRadius = distToStart + radiusOffset;

    // 3. 计算两条射线方向角（从交点出发指向终点）
    const dir1 = Math.atan2(line1End.y - iy, line1End.x - ix);
    const dir2 = Math.atan2(line2End.y - iy, line2End.x - ix);

    // 4. 确定圆弧起止角度（取较小扇区）
    let startA = dir1, endA = dir2;
    let diff = endA - startA;
    while (diff < 0) diff += Math.PI * 2;
    while (diff > Math.PI * 2) diff -= Math.PI * 2;
    if (diff > Math.PI) {
      startA = dir2;
      endA = dir1;
      diff = Math.PI * 2 - diff;
    }

    // 5. 绘制圆弧
    ctx.save();
    ctx.strokeStyle = '#ef4444';
    ctx.lineWidth = 1;
    ctx.setLineDash([]);
    ctx.beginPath();
    ctx.arc(ix, iy, arcRadius, startA, endA, false);
    ctx.stroke();

    // 6. 绘制角度文本（圆弧中点）
    const midA = startA + diff / 2;
    const textR = arcRadius + 12;
    const tx = ix + textR * Math.cos(midA);
    const ty = iy + textR * Math.sin(midA);

    ctx.font = '11px "Microsoft YaHei", sans-serif';
    ctx.fillStyle = '#ef4444';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(angle.toFixed(1) + '°', tx, ty);
    ctx.restore();
  }

  function draw() {
    // 获取参数
    const mode = elMode.value;
    const segments = parseInt(elSegments.value);
    const ductWidth = parseFloat(elWidth.value) || 1200;
    const totalLength = parseFloat(elLength.value) || 2000;
    const offsetVal = parseFloat(elOffset.value) || 700;
    const defaultStraight = parseFloat(elStraight.value) || 50;
    let ls1 = parseFloat(elLS1.value) || 0;
    let ls2 = parseFloat(elLS2.value) || 0;
    let rs1 = parseFloat(elRS1.value) || 0;
    let rs2 = parseFloat(elRS2.value) || 0;
    let midLength = parseFloat(elMid.value) || 0;

    // 切点/终点变量（供角度标注使用）
    let ltEndPt = null, lbEndPt = null, rtEndPt = null, rbEndPt = null;

    // 计算核心参数
    const calcLength = totalLength - ls1 - rs1;
    let shortTotal, bendRadius, bendAngle;

    if (mode === 'arc') {
      shortTotal = midLength + ls2 + rs2;
      const result = calcArcMode(calcLength, offsetVal, ductWidth, shortTotal);
      if (!result) {
        elAngle.textContent = '参数无效';
        elRadius.textContent = '参数无效';
        return;
      }
      bendRadius = result.radius;
      bendAngle = result.angle;
    } else {
      // 直缝模式
      const result = calcStraightMode(calcLength, offsetVal, ductWidth);
      if (!result) {
        elAngle.textContent = '参数无效';
        elRadius.textContent = '参数无效';
        return;
      }
      bendRadius = 0;
      bendAngle = result.angle;
      shortTotal = result.shortTotal;

      // 更新直位2和短节
      if (segments === 2) {
        ls2 = shortTotal / 2;
        rs2 = shortTotal / 2;
        midLength = 0;
      } else {
        ls2 = defaultStraight;
        rs2 = defaultStraight;
        midLength = shortTotal - ls2 - rs2;
      }
      // 同步UI（不触发事件）
      elLS2.value = ls2.toFixed(1);
      elRS2.value = rs2.toFixed(1);
      elMid.value = midLength.toFixed(1);
    }

    // 显示结果
    elAngle.textContent = bendAngle.toFixed(2) + '°';
    elRadius.textContent = bendRadius.toFixed(1) + ' mm';

    // ========== 绘图 ==========
    const dpr = window.devicePixelRatio || 1;
    const rect = canvas.getBoundingClientRect();
    canvas.width = rect.width * dpr;
    canvas.height = rect.height * dpr;
    ctx.scale(dpr, dpr);
    const W = rect.width;
    const H = rect.height;

    // 清空
    ctx.clearRect(0, 0, W, H);

    // 计算缩放
    const margin = 70;
    const availW = W - margin * 2;
    const availH = H - margin * 2;
    const realW = totalLength;
    const realH = ductWidth + offsetVal;
    const scale = Math.min(availW / realW, availH / realH);

    // 起点（左下角）
    const ox = (W - realW * scale) / 2;
    const oy = (H + realH * scale) / 2 + 10;

    // 关键坐标点（屏幕坐标）
    const leftBottom = { x: ox, y: oy };
    const leftTop = { x: ox, y: oy - ductWidth * scale };
    const leftBottomStart = { x: ox + ls1 * scale, y: oy };
    const leftTopStart = { x: ox + ls1 * scale, y: oy - ductWidth * scale };

    const rightBottom = { x: ox + totalLength * scale, y: oy - offsetVal * scale };
    const rightTop = { x: ox + totalLength * scale, y: oy - (ductWidth + offsetVal) * scale };
    const rightBottomStart = { x: ox + (totalLength - rs1) * scale, y: oy - offsetVal * scale };
    const rightTopStart = { x: ox + (totalLength - rs1) * scale, y: oy - (ductWidth + offsetVal) * scale };

    // 圆心点
    const leftCenter = { x: leftTopStart.x, y: leftTopStart.y - bendRadius * scale };
    const rightCenter = { x: rightBottomStart.x, y: rightBottomStart.y + bendRadius * scale };

    // ===== 绘制管道 =====
    ctx.strokeStyle = '#1f2937';
    ctx.lineWidth = 1.5;
    ctx.setLineDash([]);

    // 左边直段
    ctx.beginPath();
    ctx.moveTo(leftBottom.x, leftBottom.y);
    ctx.lineTo(leftBottomStart.x, leftBottomStart.y);
    ctx.lineTo(leftTopStart.x, leftTopStart.y);
    ctx.lineTo(leftTop.x, leftTop.y);
    ctx.closePath();
    ctx.stroke();

    // 右边直段
    ctx.beginPath();
    ctx.moveTo(rightBottom.x, rightBottom.y);
    ctx.lineTo(rightBottomStart.x, rightBottomStart.y);
    ctx.lineTo(rightTopStart.x, rightTopStart.y);
    ctx.lineTo(rightTop.x, rightTop.y);
    ctx.closePath();
    ctx.stroke();

    // 绘制弯头圆弧和中间连接段
    if (bendAngle > 0 && bendAngle < 90) {
      const angleRad = bendAngle * Math.PI / 180;

      if (bendRadius > 0) {
        // 弧形模式 - 绘制圆弧
        // 左上弧
        ltEndPt = drawArc(leftCenter.x, leftCenter.y, leftTopStart.x, leftTopStart.y, -bendAngle, scale);
        // 左下弧
        lbEndPt = drawArc(leftCenter.x, leftCenter.y, leftBottomStart.x, leftBottomStart.y, -bendAngle, scale);
        // 右上弧
        rtEndPt = drawArc(rightCenter.x, rightCenter.y, rightTopStart.x, rightTopStart.y, -bendAngle, scale);
        // 右下弧
        rbEndPt = drawArc(rightCenter.x, rightCenter.y, rightBottomStart.x, rightBottomStart.y, -bendAngle, scale);

        // 计算中间段的端点（沿切线方向偏移直位2距离）
        const dx = rbEndPt.x - lbEndPt.x;
        const dy = rbEndPt.y - lbEndPt.y;
        const segLen = Math.sqrt(dx * dx + dy * dy);

        if (segLen > 0) {
          const ux = dx / segLen, uy = dy / segLen;
          const ltLeft = { x: ltEndPt.x + ux * ls2 * scale, y: ltEndPt.y + uy * ls2 * scale };
          const ltRight = { x: rtEndPt.x - ux * rs2 * scale, y: rtEndPt.y - uy * rs2 * scale };
          const lbLeft = { x: lbEndPt.x + ux * ls2 * scale, y: lbEndPt.y + uy * ls2 * scale };
          const lbRight = { x: rbEndPt.x - ux * rs2 * scale, y: rbEndPt.y - uy * rs2 * scale };

          // 中间连接段（上线+下线）
          ctx.beginPath();
          ctx.moveTo(ltEndPt.x, ltEndPt.y);
          ctx.lineTo(ltLeft.x, ltLeft.y);
          ctx.lineTo(ltRight.x, ltRight.y);
          ctx.lineTo(rtEndPt.x, rtEndPt.y);
          ctx.stroke();

          ctx.beginPath();
          ctx.moveTo(lbEndPt.x, lbEndPt.y);
          ctx.lineTo(lbLeft.x, lbLeft.y);
          ctx.lineTo(lbRight.x, lbRight.y);
          ctx.lineTo(rbEndPt.x, rbEndPt.y);
          ctx.stroke();

          // 分割线（虚线）
          if (ls2 > 0) {
            ctx.save();
            ctx.strokeStyle = '#ef4444';
            ctx.setLineDash([4, 3]);
            ctx.beginPath();
            ctx.moveTo(lbEndPt.x, lbEndPt.y);
            ctx.lineTo(ltEndPt.x, ltEndPt.y);
            ctx.stroke();
            ctx.beginPath();
            ctx.moveTo(lbLeft.x, lbLeft.y);
            ctx.lineTo(ltLeft.x, ltLeft.y);
            ctx.stroke();
            ctx.restore();
          }
          if (rs2 > 0) {
            ctx.save();
            ctx.strokeStyle = '#ef4444';
            ctx.setLineDash([4, 3]);
            ctx.beginPath();
            ctx.moveTo(rbEndPt.x, rbEndPt.y);
            ctx.lineTo(rtEndPt.x, rtEndPt.y);
            ctx.stroke();
            ctx.beginPath();
            ctx.moveTo(lbRight.x, lbRight.y);
            ctx.lineTo(ltRight.x, ltRight.y);
            ctx.stroke();
            ctx.restore();
          }

          // 中间竖线（三节时的短节分隔）
          if (midLength > 0 && segments === 3) {
            ctx.beginPath();
            ctx.moveTo(lbLeft.x, lbLeft.y);
            ctx.lineTo(ltLeft.x, ltLeft.y);
            ctx.stroke();
            ctx.beginPath();
            ctx.moveTo(lbRight.x, lbRight.y);
            ctx.lineTo(ltRight.x, ltRight.y);
            ctx.stroke();
          }

          // 尺寸标注 - 短节
          if (midLength > 0) {
            drawDimension(ltLeft.x, ltLeft.y, ltRight.x, ltRight.y, midLength.toFixed(0), -18);
          }
          // 直位2标注
          if (ls2 > 0) {
            drawDimension(lbEndPt.x, lbEndPt.y, lbLeft.x, lbLeft.y, ls2.toFixed(0), 10);
          }
          if (rs2 > 0) {
            drawDimension(lbRight.x, lbRight.y, rbEndPt.x, rbEndPt.y, rs2.toFixed(0), 10);
          }
        }
      } else {
        // 直缝模式 - 直线折弯（无圆弧）
        const cos = Math.cos(angleRad);
        const sin = Math.sin(angleRad);

        // 切点 = 起点绕圆心旋转角度后的位置
        // 直缝模式下内径=0，切点就是起点本身向斜方向延伸
        const ltEnd = rotatePoint(leftTopStart.x, leftTopStart.y - 0.001,
          leftTopStart.x, leftTopStart.y, -bendAngle);
        const lbEnd = rotatePoint(leftBottomStart.x, leftBottomStart.y - 0.001,
          leftBottomStart.x, leftBottomStart.y, -bendAngle);
        const rtEnd = rotatePoint(rightTopStart.x, rightTopStart.y + 0.001,
          rightTopStart.x, rightTopStart.y, -bendAngle);
        const rbEnd = rotatePoint(rightBottomStart.x, rightBottomStart.y + 0.001,
          rightBottomStart.x, rightBottomStart.y, -bendAngle);

        // 简化绘制：用直线连接左起点到右起点的中间段
        const dx = rightBottomStart.x - leftBottomStart.x;
        const dy = rightBottomStart.y - leftBottomStart.y;
        const segLen = Math.sqrt(dx * dx + dy * dy);
        const ux = dx / segLen, uy = dy / segLen;
        // 法线
        const nx = -uy, ny = ux;

        // 上下边线
        const ltStart = { x: leftTopStart.x, y: leftTopStart.y };
        const lbStart = { x: leftBottomStart.x, y: leftBottomStart.y };
        const rtStart = { x: rightTopStart.x, y: rightTopStart.y };
        const rbStart = { x: rightBottomStart.x, y: rightBottomStart.y };

        // 中间段直接斜着连接
        ctx.beginPath();
        ctx.moveTo(ltStart.x, ltStart.y);
        ctx.lineTo(rtStart.x, rtStart.y);
        ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(lbStart.x, lbStart.y);
        ctx.lineTo(rbStart.x, rbStart.y);
        ctx.stroke();

        // 分割虚线
        if (ls2 > 0) {
          const p1 = { x: lbStart.x + ux * ls2 * scale, y: lbStart.y + uy * ls2 * scale };
          const p2 = { x: ltStart.x + ux * ls2 * scale, y: ltStart.y + uy * ls2 * scale };
          ctx.save();
          ctx.strokeStyle = '#ef4444';
          ctx.setLineDash([4, 3]);
          ctx.beginPath();
          ctx.moveTo(p1.x, p1.y);
          ctx.lineTo(p2.x, p2.y);
          ctx.stroke();
          ctx.restore();
        }
        if (rs2 > 0) {
          const p1 = { x: rbStart.x - ux * rs2 * scale, y: rbStart.y - uy * rs2 * scale };
          const p2 = { x: rtStart.x - ux * rs2 * scale, y: rtStart.y - uy * rs2 * scale };
          ctx.save();
          ctx.strokeStyle = '#ef4444';
          ctx.setLineDash([4, 3]);
          ctx.beginPath();
          ctx.moveTo(p1.x, p1.y);
          ctx.lineTo(p2.x, p2.y);
          ctx.stroke();
          ctx.restore();
        }
      }
    }

    // 左边直位1分割线
    if (ls1 > 0) {
      ctx.save();
      ctx.strokeStyle = '#ef4444';
      ctx.setLineDash([4, 3]);
      ctx.beginPath();
      ctx.moveTo(leftBottomStart.x, leftBottomStart.y);
      ctx.lineTo(leftTopStart.x, leftTopStart.y);
      ctx.stroke();
      ctx.restore();
      drawDimension(leftBottom.x, leftBottom.y, leftBottomStart.x, leftBottomStart.y, ls1.toFixed(0), 12);
    }

    // 右边直位1分割线
    if (rs1 > 0) {
      ctx.save();
      ctx.strokeStyle = '#ef4444';
      ctx.setLineDash([4, 3]);
      ctx.beginPath();
      ctx.moveTo(rightBottomStart.x, rightBottomStart.y);
      ctx.lineTo(rightTopStart.x, rightTopStart.y);
      ctx.stroke();
      ctx.restore();
      drawDimension(rightTop.x, rightTop.y, rightTopStart.x, rightTopStart.y, rs1.toFixed(0), 10);
    }

    // 外围尺寸标注
    drawDimension(leftBottom.x, leftBottom.y, leftTop.x, leftTop.y, ductWidth.toFixed(0), 22);
    const helpPt = { x: leftTop.x, y: leftTop.y - offsetVal * scale };
    drawDimension(leftTop.x, leftTop.y, helpPt.x, helpPt.y, offsetVal.toFixed(0), 22);
    drawDimension(helpPt.x, helpPt.y, rightTop.x, rightTop.y, totalLength.toFixed(0), 30);

    // 角度标注（在折角中间位置画圆弧标注）
    if (bendAngle > 0 && bendAngle < 90) {
      if (bendRadius > 0 && ltEndPt && lbEndPt && rtEndPt && rbEndPt) {
        // 弧形模式：标注圆弧与直段之间的夹角
        drawAngleAnnotation(ltEndPt, lbEndPt, leftTopStart, leftBottomStart, ductWidth / 2 * scale, bendAngle);
        drawAngleAnnotation(rbEndPt, rtEndPt, rightBottomStart, rightTopStart, ductWidth / 2 * scale, bendAngle);
      } else {
        // 菱角模式：标注折线与直段之间的夹角
        const midDirTop = { x: rightTopStart.x - leftTopStart.x, y: rightTopStart.y - leftTopStart.y };
        const midDirBot = { x: rightBottomStart.x - leftBottomStart.x, y: rightBottomStart.y - leftBottomStart.y };
        // 左折角
        drawAngleAnnotation(
          leftTopStart, leftBottomStart,
          { x: leftTopStart.x + midDirTop.x * 0.3, y: leftTopStart.y + midDirTop.y * 0.3 },
          { x: leftBottomStart.x + midDirBot.x * 0.3, y: leftBottomStart.y + midDirBot.y * 0.3 },
          ductWidth / 2 * scale, bendAngle
        );
        // 右折角
        drawAngleAnnotation(
          rightBottomStart, rightTopStart,
          { x: rightBottomStart.x - midDirBot.x * 0.3, y: rightBottomStart.y - midDirBot.y * 0.3 },
          { x: rightTopStart.x - midDirTop.x * 0.3, y: rightTopStart.y - midDirTop.y * 0.3 },
          ductWidth / 2 * scale, bendAngle
        );
      }
    }
  }

  // ========== 事件绑定 ==========
  const allInputs = [elMode, elSegments, elWidth, elLength, elOffset, elStraight,
                     elLS1, elLS2, elRS1, elRS2, elMid];

  allInputs.forEach(el => {
    el.addEventListener('input', debounce(onParamChange, 150));
    el.addEventListener('change', onParamChange);
  });

  function debounce(fn, ms) {
    let timer;
    return function(...args) {
      clearTimeout(timer);
      timer = setTimeout(() => fn.apply(this, args), ms);
    };
  }

  function onParamChange() {
    // 直缝模式下禁用直位2和短节输入
    const isStraight = elMode.value === 'straight';
    elLS2.disabled = isStraight;
    elRS2.disabled = isStraight;
    elMid.disabled = isStraight || parseInt(elSegments.value) === 2;

    // 弧形模式下，两节时短节=0
    if (elMode.value === 'arc' && parseInt(elSegments.value) === 2) {
      elMid.value = '0';
      elMid.disabled = true;
    }

    draw();
  }

  // 窗口大小变化时重绘
  let resizeTimer;
  window.addEventListener('resize', function() {
    clearTimeout(resizeTimer);
    resizeTimer = setTimeout(draw, 100);
  });

  // 初始绘制
  onParamChange();
  draw();

})();
</script>
