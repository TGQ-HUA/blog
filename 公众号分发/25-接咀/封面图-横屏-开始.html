<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>25-接咀-封面-开始</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 1920px; height: 1080px; overflow: hidden; background: linear-gradient(135deg, #0d1117 0%, #161b22 100%); font-family: "Microsoft YaHei", "PingFang SC", sans-serif; color: #fff; display: flex; align-items: center; justify-content: center; }
.bg-circle { position: absolute; border-radius: 50%; opacity: 0.04; pointer-events: none; }
.bg-circle-1 { width: 700px; height: 700px; background: #f0883e; top: -200px; right: -150px; }
.bg-circle-2 { width: 500px; height: 500px; background: #58a6ff; bottom: -150px; left: -100px; }
.content { text-align: center; position: relative; z-index: 1; }
.main-title { font-size: 88px; font-weight: 900; color: #f0883e; letter-spacing: 6px; margin-bottom: 20px; text-shadow: 0 0 60px rgba(240,136,62,0.3); }
.sub-title { font-size: 42px; color: #e6edf3; line-height: 1.6; margin-bottom: 40px; }
.tag { display: inline-block; padding: 8px 24px; border: 1px solid rgba(240,136,62,0.3); border-radius: 20px; color: #f0883e; font-size: 24px; margin: 0 8px; }
.brand { position: absolute; bottom: 60px; text-align: center; width: 100%; left: 0; color: #8b949e; font-size: 28px; letter-spacing: 2px; }
</style>
</head>
<body>
<div class="bg-circle bg-circle-1"></div>
<div class="bg-circle bg-circle-2"></div>
<div class="content">
  <div class="main-title">开口接咀</div>
  <div class="sub-title">
    图纸上标个Φ200<br>
    车间做起来可不止钻个孔那么简单
  </div>
  <div>
    <span class="tag">踩坑实录</span>
    <span class="tag">风管制作</span>
    <span class="tag">工艺细节</span>
  </div>
</div>
<div class="brand">奇美星暖通风管制作</div>
</body>
</html>
