<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=1920, height=1080" />
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{width:1920px;height:1080px;overflow:hidden;font-family:"Microsoft YaHei",Arial,sans-serif;display:flex;align-items:center;justify-content:center;background:linear-gradient(150deg,#eff6ff,#fef7f0,#f0f9ff)}
.orb{position:absolute;border-radius:50%;filter:blur(70px);opacity:.4}
.o1{width:450px;height:450px;top:5%;left:3%;background:radial-gradient(circle,rgba(37,99,235,.5),transparent)}
.o2{width:380px;height:380px;top:40%;right:5%;background:radial-gradient(circle,rgba(249,115,22,.4),transparent)}
.o3{width:320px;height:320px;bottom:5%;left:35%;background:radial-gradient(circle,rgba(249,115,22,.3),transparent)}
.o4{width:280px;height:280px;top:60%;left:60%;background:radial-gradient(circle,rgba(37,99,235,.25),transparent)}
.card{position:relative;z-index:1;text-align:center}
h1{font-size:96px;font-weight:900;color:#0f172a;line-height:1.2}
h1 span{color:#f97316}
.sub{font-size:42px;color:#64748b;margin-top:16px}
.glass{display:inline-block;margin-top:36px;background:rgba(255,255,255,.22);backdrop-filter:blur(20px) saturate(180%);border-radius:22px;padding:24px 48px;box-shadow:0 8px 32px rgba(0,0,0,.05)}
.glass p{font-size:34px;color:#1e293b;line-height:1.8}
.brand{position:absolute;bottom:50px;right:100px;text-align:right;opacity:.7;z-index:1}
.brand .bn{font-size:28px;color:#64748b;font-weight:600}
.brand .bu{font-size:24px;color:#2563eb;margin-top:4px}
</style>
</head>
<body>
<div class="orb o1"></div><div class="orb o2"></div><div class="orb o3"></div><div class="orb o4"></div>
<div class="card">
  <h1>风管<span>三通</span>制造规则</h1>
  <div class="sub">矩形风管三通 · 从类型到做单到算量</div>
  <div class="glass">
    <p>🦋 蝴蝶型 &nbsp;|&nbsp; T型 &nbsp;|&nbsp; 📐 侧三通</p>
    <p>不等高→先改等高 · 对中+底平 · 长≠R角</p>
  </div>
</div>
<div class="brand"><div class="bn">奇美星暖通风管制作</div><div class="bu">tangguoqi.top</div></div>
</body>
</html>
