<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=1920, height=1080" />
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{width:1920px;height:1080px;overflow:hidden;font-family:"Microsoft YaHei",Arial,sans-serif;display:flex;align-items:center;justify-content:center;background:linear-gradient(150deg,#eff6ff,#fef7f0,#f0f9ff)}
.orb{position:absolute;border-radius:50%;filter:blur(70px);opacity:.4}
.o1{width:450px;height:450px;top:5%;left:3%;background:radial-gradient(circle,rgba(37,99,235,.5),transparent)}
.o2{width:380px;height:380px;top:40%;right:5%;background:radial-gradient(circle,rgba(249,115,22,.4),transparent)}
.card{position:relative;z-index:1;text-align:center}
h1{font-size:72px;font-weight:900;color:#0f172a;line-height:1.3}
h1 span{color:#f97316}
.sub{font-size:38px;color:#64748b;margin-top:20px;line-height:1.6}
.glass{display:inline-block;margin-top:32px;background:rgba(255,255,255,.22);backdrop-filter:blur(20px) saturate(180%);border-radius:22px;padding:28px 56px;box-shadow:0 8px 32px rgba(0,0,0,.05)}
.glass p{font-size:36px;color:#dc2626;font-weight:700;line-height:1.6}
.qr{margin-top:32px;text-align:center}
.qr .box{display:inline-block;width:180px;height:180px;background:rgba(255,255,255,.5);border-radius:16px;border:2px dashed rgba(0,0,0,.15);line-height:180px;font-size:28px;color:#94a3b8}
.brand{position:absolute;bottom:50px;right:100px;text-align:right;opacity:.7;z-index:1}
.brand .bn{font-size:28px;color:#64748b;font-weight:600}
.brand .bu{font-size:24px;color:#2563eb;margin-top:4px}
</style>
</head>
<body>
<div class="orb o1"></div><div class="orb o2"></div>
<div class="card">
  <h1>风管三通制造规则<br><span>速查指南</span></h1>
  <div class="sub">奇美星暖通风管制作 · 12年经验总结</div>
  <div class="glass">
    <p>📱 扫码关注，每周分享风管实战经验</p>
  </div>
  <div class="qr"><div class="box">公众号二维码</div></div>
</div>
<div class="brand"><div class="bn">奇美星暖通风管制作</div><div class="bu">tangguoqi.top</div></div>
</body>
</html>
