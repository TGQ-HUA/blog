<!doctype html>
<html lang="zh-CN">
<head><meta charset="UTF-8"/><meta name="viewport" content="width=1920,height=1080"/>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{width:1920px;height:1080px;overflow:hidden;font-family:"Microsoft YaHei",Arial,sans-serif;color:#fff;background:linear-gradient(150deg,#0f172a,#1e293b,#1e3a5f)}
.bg{position:absolute;inset:0}
.orb{position:absolute;border-radius:50%;filter:blur(70px);opacity:.35}
.o1{width:420px;height:420px;top:8%;left:3%;background:radial-gradient(circle,rgba(37,99,235,.55),transparent)}
.o2{width:360px;height:360px;bottom:15%;right:8%;background:radial-gradient(circle,rgba(16,185,129,.4),transparent)}
.content{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center}
.title{font-size:64px;font-weight:900;line-height:1.3;max-width:1500px}
.title .o{color:#f97316}
.sub{font-size:36px;color:#cbd5e1;margin-top:24px;line-height:1.6}
.brand{position:absolute;bottom:50px;text-align:center;width:100%}
.brand .bn{font-size:36px;color:#f1f5f9;font-weight:700}
.brand .bu{font-size:28px;color:#3b82f6;font-family:Consolas,monospace;margin-top:6px}
.tag{position:absolute;top:40px;right:50px;background:rgba(16,185,129,.25);padding:10px 24px;border-radius:8px;font-size:28px;color:#10b981;font-weight:600}
</style>
</head>
<body>
<div class="bg"><div class="orb o1"></div><div class="orb o2"></div></div>
<div class="tag">扫码关注 · 更多干货</div>
<div class="content">
  <div class="title">双层保温管<span class="o">尺寸换算</span><br>记住一个公式就够了</div>
  <div class="sub">外壁长 = 实长 - 200mm<br><br>内胆长 = 实长 + 20mm</div>
</div>
<div class="brand">
  <div class="bn">奇美星暖通风管制作</div>
  <div class="bu">tangguoqi.top</div>
</div>
</body>
</html>
