<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>横屏封面 - 选型排料问题版</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { display: flex; justify-content: center; align-items: center; min-height: 100vh; background: #0a0a0a; }
.card {
    width: 1920px; height: 1080px;
    background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 40%, #0f172a 100%);
    display: flex; align-items: center; padding: 0; position: relative; overflow: hidden;
}
.left { flex: 1; padding: 80px 60px 80px 100px; display: flex; flex-direction: column; justify-content: center; position: relative; z-index: 2; }
.right { width: 400px; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 60px; position: relative; z-index: 2; }
.card::before { content: ''; position: absolute; top: -300px; right: -200px; width: 800px; height: 800px; background: radial-gradient(circle, rgba(99,102,241,0.12) 0%, transparent 60%); border-radius: 50%; }
.tag { display: inline-block; background: #6366f1; color: #fff; font-size: 28px; font-weight: 700; padding: 8px 24px; border-radius: 6px; margin-bottom: 40px; }
.main-title { font-size: 78px; color: #fff; font-weight: 900; line-height: 1.3; margin-bottom: 30px; }
.main-title .highlight { color: #f59e0b; }
.subtitle { font-size: 36px; color: #94a3b8; margin-bottom: 40px; line-height: 1.5; }
.pain-list { list-style: none; }
.pain-list li { font-size: 32px; color: #cbd5e1; padding: 12px 0; display: flex; align-items: center; gap: 16px; }
.pain-list li .icon { font-size: 28px; }
.divider { position: absolute; right: 400px; top: 100px; bottom: 100px; width: 1px; background: linear-gradient(to bottom, transparent, rgba(255,255,255,0.15), transparent); }
.qr-wrapper { width: 220px; height: 220px; background: #fff; border-radius: 16px; padding: 12px; box-shadow: 0 8px 32px rgba(0,0,0,0.3); margin-bottom: 20px; }
.qr-wrapper img { width: 100%; height: 100%; object-fit: contain; border-radius: 8px; }
.qr-label { font-size: 22px; color: #94a3b8; text-align: center; margin-bottom: 6px; }
.qr-name { font-size: 22px; color: #f59e0b; text-align: center; font-weight: 600; margin-bottom: 16px; }
.blog-url { font-size: 22px; color: #67e8f9; text-align: center; font-family: Consolas, monospace; background: rgba(0,0,0,0.3); padding: 8px 20px; border-radius: 20px; }
.version-tag { position: absolute; bottom: 40px; left: 100px; font-size: 24px; color: #10b981; border: 1px solid #10b981; padding: 6px 18px; border-radius: 20px; z-index: 2; }
</style>
</head>
<body>
<div class="card">
    <div class="left">
        <div class="tag">📖 CAMduct 新手教程</div>
        <div class="main-title">
            打开软件<span class="highlight">一脸懵</span>？<br>
            然后呢？
        </div>
        <div class="subtitle">选型、排料、出NC码……完整流程到底怎么走？</div>
        <ul class="pain-list">
            <li><span class="icon">😵</span> 图库在哪？参数怎么填？</li>
            <li><span class="icon">😵</span> 自动排版按钮按了没反应？</li>
            <li><span class="icon">😵</span> NC码到底保存到哪个文件夹？</li>
        </ul>
    </div>
    <div class="divider"></div>
    <div class="right">
        <div class="qr-label">扫码关注公众号</div>
        <div class="qr-wrapper">
            <img src="公众号二维码.jpg" alt="公众号二维码">
        </div>
        <div class="qr-name">奇美星暖通风管制作</div>
        <div class="blog-url">tangguoqi.top</div>
    </div>
    <div class="version-tag">所有版本 CAMduct 通用</div>
</div>
</body>
</html>
