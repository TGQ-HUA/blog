<!doctype html>
<html lang="zh-CN">
<head><meta charset="UTF-8"/><meta name="viewport" content="width=1920,height=1080"/><title>封面-开始</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{width:1920px;height:1080px;overflow:hidden;font-family:"Microsoft YaHei",Arial,sans-serif;background:linear-gradient(150deg,#0f172a,#1e293b)}
.orb{position:absolute;border-radius:50%;filter:blur(80px);opacity:.3}
.o1{width:500px;height:500px;top:5%;left:2%;background:radial-gradient(circle,rgba(37,99,235,.6),transparent)}
.o2{width:400px;height:400px;top:55%;right:5%;background:radial-gradient(circle,rgba(249,115,22,.5),transparent)}
.content{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:60px}
.title{font-size:100px;font-weight:900;color:#f8fafc;line-height:1.15}
.title .hl{color:#f97316}
.title .r{color:#ef4444}
.sub{font-size:48px;color:#94a3b8;margin-top:30px}
.brand{margin-top:60px;padding:20px 40px;background:rgba(255,255,255,.06);border-radius:16px}
.brand .n{font-size:32px;color:#f8fafc;font-weight:700}
.brand .u{font-size:26px;color:#60a5fa;font-family:Consolas,monospace;margin-top:6px}
.tag{position:absolute;top:30px;right:40px;font-size:22px;color:#64748b;background:rgba(255,255,255,.06);padding:8px 18px;border-radius:8px}
</style>
</head>
<body>
<div class="orb o1"></div><div class="orb o2"></div>
<div class="tag">暖通风管制作</div>
<div class="content">
  <div class="title">风管测定孔<br>一个<span class="hl">Φ100</span>的小东西</div>
  <div class="sub">为什么总能闹到安装现场去切割？</div>
  <div class="brand">
    <div class="n">奇美星暖通风管制作</div>
    <div class="u">tangguoqi.top</div>
  </div>
</div>
</body>
</html>
