<!doctype html>
<html lang="zh-CN"><head><meta charset="UTF-8"><title>横屏封面-开始</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}body{width:1920px;height:1080px;overflow:hidden;font-family:"Microsoft YaHei",Arial,sans-serif}
.bg{position:absolute;inset:0;background:linear-gradient(150deg,#eff6ff,#fef7f0,#f0f9ff)}
.orb{position:absolute;border-radius:50%;filter:blur(70px);opacity:.4}
.o1{width:450px;height:450px;top:5%;left:3%;background:radial-gradient(circle,rgba(37,99,235,.5),transparent)}
.o2{width:380px;height:380px;top:40%;right:5%;background:radial-gradient(circle,rgba(249,115,22,.4),transparent)}
.o3{width:320px;height:320px;bottom:5%;left:35%;background:radial-gradient(circle,rgba(249,115,22,.3),transparent)}
.card{position:absolute;inset:0;display:flex;align-items:center;padding:80px 100px}
.left{flex:1.2}
.tag{display:inline-block;background:#dc2626;color:#fff;font-size:28px;font-weight:700;padding:10px 28px;border-radius:10px;margin-bottom:36px}
.title{font-size:80px;color:#0f172a;font-weight:900;line-height:1.2;margin-bottom:24px}
.title .accent{color:#dc2626}
.sub{font-size:38px;color:#64748b;line-height:1.5;margin-bottom:40px}
.points{list-style:none}
.points li{font-size:34px;color:#475569;padding:10px 0;display:flex;align-items:center;gap:16px}
.points li .dot{width:10px;height:10px;background:#f97316;border-radius:50%;flex-shrink:0}
.brand{position:absolute;bottom:40px;left:100px;font-size:30px;color:#64748b;font-weight:600}
.brand .url{color:#2563eb;margin-left:20px;font-size:26px}
</style></head><body>
<div class="bg"></div><div class="orb o1"></div><div class="orb o2"></div><div class="orb o3"></div>
<div class="card"><div class="left">
<div class="tag">⚠️ 踩坑实录</div>
<div class="title">风管漏风量测试<br><span class="accent">被监理退货那一次</span></div>
<div class="sub">亏了两万块才搞明白的事——GB50243严密性试验怎么过</div>
<ul class="points">
<li><span class="dot"></span>低压/中压/高压各抽检多少？</li>
<li><span class="dot"></span>灯光法+手感法靠谱吗？</li>
<li><span class="dot"></span>漏风80%集中在这三个地方</li>
</ul>
</div></div>
<div class="brand">奇美星暖通风管制作<span class="url">tangguoqi.top</span></div>
</body></html>
