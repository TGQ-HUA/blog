<!doctype html>
<html lang="zh-CN"><head><meta charset="UTF-8"><title>横屏封面-结尾</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}body{width:1920px;height:1080px;overflow:hidden;font-family:"Microsoft YaHei",Arial,sans-serif}
.bg{position:absolute;inset:0;background:linear-gradient(150deg,#eff6ff,#fef7f0,#f0f9ff)}
.orb{position:absolute;border-radius:50%;filter:blur(70px);opacity:.4}
.o1{width:450px;height:450px;top:5%;left:3%;background:radial-gradient(circle,rgba(37,99,235,.5),transparent)}
.o2{width:380px;height:380px;top:40%;right:5%;background:radial-gradient(circle,rgba(249,115,22,.4),transparent)}
.card{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;gap:80px;padding:80px}
.mid{text-align:center}
.mid .t{font-size:64px;font-weight:900;color:#0f172a;line-height:1.3;margin-bottom:16px}
.mid .t .accent{color:#f97316}
.mid .s{font-size:38px;color:#64748b;margin-bottom:40px}
.right-col{text-align:center}
.qr-box{width:240px;height:240px;background:#fff;border-radius:20px;padding:14px;box-shadow:0 8px 32px rgba(249,115,22,.12);margin-bottom:16px}
.qr-box img{width:100%;height:100%;object-fit:contain;border-radius:10px}
.qr-label{font-size:26px;color:#64748b;margin-bottom:6px}
.qr-name{font-size:30px;color:#f97316;font-weight:700;margin-bottom:12px}
.blog-url{font-size:26px;color:#64748b;font-family:Consolas,monospace;background:rgba(249,115,22,.08);padding:10px 24px;border-radius:24px}
.brand{position:absolute;bottom:40px;left:80px;font-size:28px;color:#64748b;font-weight:600}
</style></head><body>
<div class="bg"></div><div class="orb o1"></div><div class="orb o2"></div>
<div class="card">
<div class="mid"><div class="t">更多风管制造干货<br><span class="accent">每周更新</span></div><div class="s">漏风测试 · 弯头规则 · 法兰选型<br>S弯排版 · 防火板 · CAMduct</div></div>
<div class="right-col"><div class="qr-label">扫码关注公众号</div><div class="qr-box"><img src="../公众号二维码.jpg" alt="二维码"></div><div class="qr-name">奇美星暖通风管制作</div><div class="blog-url">tangguoqi.top</div></div>
</div>
<div class="brand">奇美星暖通风管制作</div>
</body></html>
