<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=1920, height=1080" />
<script src="gsap.min.js"></script>
<style>
@font-face{font-family:'Microsoft YaHei';src:local('Microsoft YaHei')}
*{margin:0;padding:0;box-sizing:border-box}
body{width:1920px;height:1080px;overflow:hidden;font-family:"Microsoft YaHei",Arial,sans-serif;color:#fff}
.bg{position:absolute;inset:0;background:linear-gradient(150deg,#eff6ff,#f0f9ff,#eef2f2)}
.orb{position:absolute;border-radius:50%;filter:blur(70px);opacity:.4}
.o1{width:500px;height:500px;top:5%;left:2%;background:radial-gradient(circle,rgba(37,99,235,.6),transparent)}
.o2{width:400px;height:400px;bottom:3%;right:5%;background:radial-gradient(circle,rgba(249,115,22,.5),transparent)}
.content{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:80px 100px}
.title{font-size:92px;font-weight:900;color:#0f172a;text-align:center;line-height:1.3}
.title .o{color:#f97316}
.title .r{color:#dc2626}
.sub{font-size:38px;color:#64748b;text-align:center;margin-top:30px;line-height:1.6}
.brand{margin-top:60px;text-align:center}
.brand .bn{font-size:34px;color:#0f172a;font-weight:700}
.brand .bu{font-size:28px;color:#2563eb;font-family:Consolas,monospace;margin-top:8px}
.tag{position:absolute;bottom:40px;left:50%;transform:translateX(-50%);font-size:24px;color:#94a3b8}
</style>
</head>
<body>
<div class="bg"></div>
<div class="orb o1"></div>
<div class="orb o2"></div>
<div class="content">
  <div class="title">天圆地方（方变圆）制作<br><span class="o">六种连接方式</span><br><span class="r">选错一种就得多焊半小时</span></div>
  <div class="sub">方口→圆口 · 对中/平边/偏差 · 咬口/碰焊分水岭</div>
  <div class="brand">
    <div class="bn">奇美星暖通风管制作</div>
    <div class="bu">tangguoqi.top</div>
  </div>
  <div class="tag">#暖通 #风管 #方变圆 #技术干货</div>
</div>
</body>
</html>
