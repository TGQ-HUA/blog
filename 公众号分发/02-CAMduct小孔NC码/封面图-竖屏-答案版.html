<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>竖屏封面 - 答案版</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    background: #0a0a0a;
}
.card {
    width: 1080px;
    height: 1440px;
    background: linear-gradient(160deg, #0f2027 0%, #0a1628 40%, #1a1a2e 100%);
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 70px 80px;
    position: relative;
    overflow: hidden;
}
/* 装饰 */
.card::before {
    content: '';
    position: absolute;
    top: -200px;
    left: -200px;
    width: 600px;
    height: 600px;
    background: radial-gradient(circle, rgba(16,185,129,0.12) 0%, transparent 60%);
    border-radius: 50%;
}
.card::after {
    content: '';
    position: absolute;
    bottom: -150px;
    right: -150px;
    width: 500px;
    height: 500px;
    background: radial-gradient(circle, rgba(245,158,11,0.1) 0%, transparent 60%);
    border-radius: 50%;
}
/* 顶部标签 */
.solved-badge {
    display: inline-block;
    background: #10b981;
    color: #fff;
    font-size: 30px;
    font-weight: 700;
    padding: 10px 28px;
    border-radius: 6px;
    margin-bottom: 36px;
    position: relative;
    z-index: 1;
}
/* 主标题 */
.main-title {
    font-size: 62px;
    color: #fff;
    font-weight: 900;
    text-align: center;
    line-height: 1.4;
    margin-bottom: 16px;
    position: relative;
    z-index: 1;
}
.main-title .green {
    color: #10b981;
}
/* 副标题 */
.subtitle {
    font-size: 34px;
    color: #94a3b8;
    text-align: center;
    margin-bottom: 44px;
    position: relative;
    z-index: 1;
}
/* 解决方案框 */
.solution-box {
    background: rgba(16,185,129,0.08);
    border: 2px solid rgba(16,185,129,0.4);
    border-radius: 20px;
    padding: 36px 44px;
    width: 100%;
    margin-bottom: 36px;
    position: relative;
    z-index: 1;
}
.solution-box .label {
    font-size: 28px;
    color: #10b981;
    font-weight: 700;
    margin-bottom: 20px;
    display: flex;
    align-items: center;
    gap: 10px;
}
.solution-box .step {
    font-size: 34px;
    color: #e2e8f0;
    line-height: 2;
}
.solution-box .path {
    font-family: Consolas, "Courier New", monospace;
    font-size: 30px;
    color: #67e8f9;
    background: rgba(0,0,0,0.4);
    padding: 12px 20px;
    border-radius: 8px;
    display: block;
    margin-top: 16px;
    text-align: center;
}
/* 关键参数高亮 */
.param-highlight {
    background: rgba(245,158,11,0.1);
    border: 2px solid rgba(245,158,11,0.4);
    border-radius: 16px;
    padding: 24px 36px;
    width: 100%;
    text-align: center;
    margin-bottom: 40px;
    position: relative;
    z-index: 1;
}
.param-highlight .key {
    font-size: 30px;
    color: #f59e0b;
    font-weight: 700;
}
.param-highlight .value {
    font-size: 48px;
    color: #fff;
    font-weight: 900;
    margin-top: 8px;
}
/* 版本标签 */
.version-tag {
    font-size: 26px;
    color: #10b981;
    border: 1px solid #10b981;
    padding: 8px 22px;
    border-radius: 20px;
    margin-bottom: 40px;
    position: relative;
    z-index: 1;
}
/* 底部区域 */
.bottom-area {
    display: flex;
    align-items: center;
    gap: 30px;
    margin-top: auto;
    position: relative;
    z-index: 1;
}
.qr-wrapper {
    width: 180px;
    height: 180px;
    background: #fff;
    border-radius: 12px;
    padding: 10px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.3);
    flex-shrink: 0;
}
.qr-wrapper img {
    width: 100%;
    height: 100%;
    object-fit: contain;
    border-radius: 6px;
}
.bottom-text {
    display: flex;
    flex-direction: column;
    gap: 10px;
}
.bottom-text .name {
    font-size: 30px;
    color: #f1f5f9;
    font-weight: 700;
}
.bottom-text .desc {
    font-size: 24px;
    color: #94a3b8;
}
.bottom-text .url {
    font-size: 24px;
    color: #67e8f9;
    font-family: Consolas, monospace;
    background: rgba(0,0,0,0.3);
    padding: 6px 16px;
    border-radius: 16px;
    display: inline-block;
}
</style>
</head>
<body>
<div class="card">
    <div class="solved-badge">✅ 已解决</div>
    <div class="main-title">
        CAMduct 小孔不出NC码<br>
        <span class="green">一个参数搞定</span>
    </div>
    <div class="subtitle">找了2天，原来是 Pierce Size 在"吞"小孔</div>
    <div class="solution-box">
        <div class="label">✅ 解决步骤：</div>
        <div class="step">
            File → Setup → Installed Machines<br>
            选机床 → Tool Setup → Global
        </div>
        <div class="path">Pierce Size → 改为 0 或 1mm</div>
    </div>
    <div class="param-highlight">
        <div class="key">关键参数</div>
        <div class="value">Pierce Size = 0</div>
    </div>
    <div class="version-tag">所有版本 CAMduct 通用</div>
    <div class="bottom-area">
        <div class="qr-wrapper">
            <img src="公众号二维码.jpg" alt="公众号二维码">
        </div>
        <div class="bottom-text">
            <div class="name">奇美星暖通风管制作</div>
            <div class="desc">暖通风管制造技术分享 · 每周更新</div>
            <div class="url">tangguoqi.top</div>
        </div>
    </div>
</div>
</body>
</html>
