<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=1920, height=1080" />
<style>
@font-face{font-family:'Microsoft YaHei';src:local('Microsoft YaHei')}
*{margin:0;padding:0;box-sizing:border-box}
body{width:1920px;height:1080px;overflow:hidden;font-family:"Microsoft YaHei",Arial,sans-serif;background:linear-gradient(150deg,#eff6ff,#fef7f0,#f0f9ff);display:flex;align-items:center;justify-content:center}
.card{text-align:center}
.card .t{font-size:88px;font-weight:900;color:#0f172a;line-height:1.2}
.card .t .accent{color:#f97316}
.card .s{font-size:42px;color:#475569;margin-top:24px}
.card .dim{font-size:32px;color:#94a3b8;margin-top:40px}
.brand{position:absolute;bottom:40px;right:80px;font-size:28px;color:#64748b}
</style>
</head>
<body>
<div class="card">
  <div class="t">风管<span class="accent">支吊架</span></div>
  <div class="s">规范 vs 经验</div>
  <div class="dim">GB50243-2016 第6.1.1条 · WPS表格工具</div>
</div>
<div class="brand">奇美星暖通风管制作 · tangguoqi.top</div>
</body>
</html>
