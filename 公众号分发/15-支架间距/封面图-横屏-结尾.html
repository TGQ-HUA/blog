<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=1920, height=1080" />
<style>
@font-face{font-family:'Microsoft YaHei';src:local('Microsoft YaHei')}
*{margin:0;padding:0;box-sizing:border-box}
body{width:1920px;height:1080px;overflow:hidden;font-family:"Microsoft YaHei",Arial,sans-serif;background:linear-gradient(150deg,#fef7f0,#eff6ff,#f0f9ff);display:flex;align-items:center;justify-content:center}
.card{text-align:center}
.card .t{font-size:72px;font-weight:900;color:#0f172a;line-height:1.3}
.card .t .accent{color:#f97316}
.card .s{font-size:38px;color:#475569;margin-top:20px;line-height:1.8}
.card .qr{width:200px;height:200px;background:rgba(255,255,255,.5);border-radius:16px;margin:30px auto 0;display:flex;align-items:center;justify-content:center;font-size:28px;color:#94a3b8}
.brand{position:absolute;bottom:40px;right:80px;font-size:28px;color:#64748b}
.info{position:absolute;bottom:40px;left:80px;font-size:26px;color:#94a3b8}
</style>
</head>
<body>
<div class="card">
  <div class="t">关注<span class="accent">奇美星暖通</span><br>更多风管实操经验</div>
  <div class="s">tangguoqi.top<br>风管制造·安装规范·工具分享</div>
  <div class="qr">📱 公众号二维码</div>
</div>
<div class="brand">奇美星暖通风管制作</div>
<div class="info">GB50243-2016 · 第6.1.1条</div>
</body>
</html>
