<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>横屏封面 - 问题版</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    background: #0a0a0a;
}
.card {
    width: 1920px;
    height: 1080px;
    background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 40%, #0f172a 100%);
    display: flex;
    flex-direction: row;
    align-items: center;
    padding: 0;
    position: relative;
    overflow: hidden;
}
/* 左侧主内容区 */
.left {
    flex: 1;
    padding: 80px 60px 80px 100px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    position: relative;
    z-index: 2;
}
/* 右侧二维码区 */
.right {
    width: 400px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 60px;
    position: relative;
    z-index: 2;
}
/* 装饰 */
.card::before {
    content: '';
    position: absolute;
    top: -300px;
    right: -200px;
    width: 800px;
    height: 800px;
    background: radial-gradient(circle, rgba(239,68,68,0.12) 0%, transparent 60%);
    border-radius: 50%;
}
.card::after {
    content: '';
    position: absolute;
    bottom: -200px;
    left: -100px;
    width: 600px;
    height: 600px;
    background: radial-gradient(circle, rgba(37,99,235,0.1) 0%, transparent 60%);
    border-radius: 50%;
}
/* 警告标签 */
.warning-badge {
    display: inline-block;
    background: #ef4444;
    color: #fff;
    font-size: 28px;
    font-weight: 700;
    padding: 8px 24px;
    border-radius: 6px;
    margin-bottom: 40px;
}
/* 主标题 */
.main-title {
    font-size: 82px;
    color: #fff;
    font-weight: 900;
    line-height: 1.3;
    margin-bottom: 30px;
}
.main-title .highlight {
    color: #ef4444;
}
.main-title .amber {
    color: #f59e0b;
}
/* 副标题 */
.subtitle {
    font-size: 38px;
    color: #94a3b8;
    margin-bottom: 40px;
    line-height: 1.5;
}
/* 症状列表 */
.symptoms {
    list-style: none;
    margin-top: 20px;
}
.symptoms li {
    font-size: 32px;
    color: #cbd5e1;
    padding: 12px 0;
    display: flex;
    align-items: center;
    gap: 16px;
}
.symptoms li .dot {
    width: 12px;
    height: 12px;
    background: #ef4444;
    border-radius: 50%;
    flex-shrink: 0;
}
/* 分隔线 */
.divider {
    position: absolute;
    right: 400px;
    top: 100px;
    bottom: 100px;
    width: 1px;
    background: linear-gradient(to bottom, transparent, rgba(255,255,255,0.15), transparent);
}
/* 右侧二维码 */
.qr-wrapper {
    width: 240px;
    height: 240px;
    background: #fff;
    border-radius: 16px;
    padding: 12px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.3);
    margin-bottom: 24px;
}
.qr-wrapper img {
    width: 100%;
    height: 100%;
    object-fit: contain;
    border-radius: 8px;
}
.qr-label {
    font-size: 24px;
    color: #94a3b8;
    text-align: center;
    margin-bottom: 8px;
}
.qr-name {
    font-size: 22px;
    color: #f59e0b;
    text-align: center;
    font-weight: 600;
    margin-bottom: 20px;
}
.blog-url {
    font-size: 22px;
    color: #67e8f9;
    text-align: center;
    font-family: Consolas, monospace;
    background: rgba(0,0,0,0.3);
    padding: 8px 20px;
    border-radius: 20px;
}
/* 底部版本标签 */
.version-tag {
    position: absolute;
    bottom: 40px;
    left: 100px;
    font-size: 24px;
    color: #10b981;
    border: 1px solid #10b981;
    padding: 6px 18px;
    border-radius: 20px;
    z-index: 2;
}
</style>
</head>
<body>
<div class="card">
    <div class="left">
        <div class="warning-badge">⚠️ CAMduct 踩坑记录</div>
        <div class="main-title">
            小孔不出 <span class="highlight">NC码</span>？<br>
            <span class="amber">明明画了孔，输出却没有！</span>
        </div>
        <div class="subtitle">大孔正常输出，≤5mm 的小孔全部"消失"——你遇到过吗？</div>
        <ul class="symptoms">
            <li><span class="dot"></span>图纸检查没问题</li>
            <li><span class="dot"></span>嵌套设置没问题</li>
            <li><span class="dot"></span>就是小孔不出切割代码</li>
        </ul>
    </div>
    <div class="divider"></div>
    <div class="right">
        <div class="qr-label">扫码关注公众号</div>
        <div class="qr-wrapper">
            <img src="公众号二维码.jpg" alt="公众号二维码">
        </div>
        <div class="qr-name">奇美星暖通风管制作</div>
        <div class="blog-url">tangguoqi.top</div>
    </div>
    <div class="version-tag">所有版本 CAMduct 通用</div>
</div>
</body>
</html>
