<!DOCTYPE html>
<html lang="zh-CN"><head><meta charset="UTF-8"><title>竖屏封面</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}body{display:flex;justify-content:center;align-items:center;min-height:100vh;background:#0a0a0a}
.card{width:1080px;height:1440px;background:linear-gradient(160deg,#0f2027 0%,#0a1628 40%,#1a1a2e 100%);display:flex;flex-direction:column;align-items:center;padding:70px 80px;position:relative;overflow:hidden}
.card::before{content:'';position:absolute;top:-200px;left:-200px;width:600px;height:600px;background:radial-gradient(circle,rgba(16,185,129,0.12) 0%,transparent 60%);border-radius:50%}
.tag{display:inline-block;background:#10b981;color:#fff;font-size:30px;font-weight:700;padding:10px 28px;border-radius:6px;margin-bottom:32px;position:relative;z-index:1}
.main-title{font-size:55px;color:#fff;font-weight:900;text-align:center;line-height:1.4;margin-bottom:16px;position:relative;z-index:1}
.main-title .green{color:#10b981}.main-title .hl{color:#f59e0b}
.subtitle{font-size:30px;color:#94a3b8;text-align:center;margin-bottom:36px;position:relative;z-index:1}
.sol-box{background:rgba(16,185,129,0.08);border:2px solid rgba(16,185,129,0.4);border-radius:20px;padding:36px 44px;width:100%;margin-bottom:30px;position:relative;z-index:1}
.sol-box .label{font-size:26px;color:#10b981;font-weight:700;margin-bottom:20px}
.sol-box .content{font-size:30px;color:#e2e8f0;line-height:1.8}
.kv{display:flex;gap:20px;width:100%;margin-bottom:30px;position:relative;z-index:1}
.kv-item{flex:1;background:rgba(245,158,11,0.08);border:2px solid rgba(245,158,11,0.3);border-radius:16px;padding:20px 24px;text-align:center}
.kv-item .title{font-size:22px;color:#f59e0b;margin-bottom:12px;font-weight:700}
.kv-item .value{font-size:28px;color:#fff;font-weight:900}
.summary{background:rgba(245,158,11,0.08);border:2px solid rgba(245,158,11,0.3);border-radius:16px;padding:20px 30px;width:100%;text-align:center;margin-bottom:30px;position:relative;z-index:1}
.summary .text{font-size:28px;color:#f59e0b;font-family:Consolas,monospace}
.bottom{display:flex;align-items:center;gap:28px;margin-top:auto;position:relative;z-index:1}
.qr-wrapper{width:160px;height:160px;background:#fff;border-radius:12px;padding:10px;box-shadow:0 4px 20px rgba(0,0,0,0.3);flex-shrink:0}
.qr-wrapper img{width:100%;height:100%;object-fit:contain;border-radius:6px}
.bt{display:flex;flex-direction:column;gap:8px}.bt .name{font-size:28px;color:#f1f5f9;font-weight:700}
.bt .desc{font-size:22px;color:#94a3b8}.bt .url{font-size:22px;color:#67e8f9;font-family:Consolas,monospace;background:rgba(0,0,0,0.3);padding:6px 16px;border-radius:16px;display:inline-block}
</style></head><body>
<div class="card">
    <div class="tag">✅ 风量不够？查这2处</div>
    <div class="main-title">
        风管偏差<br>
        <span class="green">两个改正一招见效</span>
    </div>
    <div class="subtitle">S弯拉直 + 大小头偏差 → 改完风量就回来</div>
    <div class="sol-box">
        <div class="label">✅ 改正方案：</div>
        <div class="content">
            <strong>坑一 S弯拉直：</strong>改用菱形S弯<br>
            <strong>坑二 大小头偏差：</strong>加长管件 + 检查偏移量<br>
            <strong>特殊情况：</strong>高差按S弯排版，别硬做变径
        </div>
    </div>
    <div class="kv">
        <div class="kv-item">
            <div class="title">S弯</div>
            <div class="value">菱形过渡</div>
        </div>
        <div class="kv-item">
            <div class="title">大小头</div>
            <div class="value">加长管件</div>
        </div>
    </div>
    <div class="summary"><div class="text">别让气流拐急弯、挤窄门</div></div>
    <div class="bottom">
        <div class="qr-wrapper"><img src="公众号二维码.jpg" alt="二维码"></div>
        <div class="bt">
            <div class="name">奇美星暖通风管制作</div>
            <div class="desc">暖通风管制造技术分享 · 每周更新</div>
            <div class="url">tangguoqi.top</div>
        </div>
    </div>
</div></body></html>
