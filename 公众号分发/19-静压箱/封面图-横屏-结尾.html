<!doctype html>
<html lang="zh-CN">
<head><meta charset="UTF-8"><style>
*{margin:0;padding:0;box-sizing:border-box}
body{width:1920px;height:1080px;background:linear-gradient(135deg,#0a0a0f 0%,#1a1a2e 100%);display:flex;align-items:center;justify-content:center;font-family:"PingFang SC","Microsoft YaHei",sans-serif;overflow:hidden}
.card{text-align:center}

.sub{font-size:32px;color:#999;margin-bottom:50px}
.qr{width:200px;height:200px;background:rgba(255,255,255,0.1);border-radius:16px;margin:0 auto 30px;display:flex;align-items:center;justify-content:center;color:#666;font-size:24px}
.cta{font-size:28px;color:#ff6b35;margin-top:40px}
.url{font-size:24px;color:#666;margin-top:15px}
</style></head>
<body>
<div class="card">

  <div class="cta">先看堵面 → 看接咀 → 看消音层<br>三条都对了，再动手。</div>
</div>
</body>
</html>
