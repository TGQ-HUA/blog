<!doctype html>
<html lang="zh-CN">
<head><meta charset="UTF-8"><style>
*{margin:0;padding:0;box-sizing:border-box}
body{width:1920px;height:1080px;background:linear-gradient(135deg,#0a0a0f 0%,#1a1a2e 50%,#16213e 100%);display:flex;align-items:center;justify-content:center;font-family:"PingFang SC","Microsoft YaHei",sans-serif;overflow:hidden}
.card{background:rgba(255,255,255,0.05);border:1px solid rgba(255,107,53,0.3);border-radius:28px;padding:80px 100px;text-align:center;max-width:1400px}
.badge{font-size:28px;color:#ff6b35;letter-spacing:6px;margin-bottom:30px;text-transform:uppercase}
h1{font-size:72px;font-weight:900;color:#fff;line-height:1.3;margin-bottom:20px}
h1 span{color:#ff6b35}
.sub{font-size:36px;color:#999;margin-bottom:50px}
.pitfalls{display:flex;gap:30px;justify-content:center;flex-wrap:wrap}
.pit{background:rgba(255,107,53,0.1);border-radius:16px;padding:20px 36px;font-size:28px;color:#ff6b35;font-weight:700}
.footer{margin-top:60px;font-size:24px;color:#666}
</style></head>
<body>
<div class="card">
  <div class="badge">🔴 风 管 厂 实 战</div>
  <h1>静压箱<span>不是</span>铁盒子</h1>
  <div class="sub">风管厂被退回来的三次教训</div>
  <div class="pitfalls">
    <div class="pit">堵面方向</div>
    <div class="pit">接咀尺寸</div>
    <div class="pit">消音层厚度</div>
    <div class="pit">阻抗片</div>
  </div>
  <div class="footer">奇美星暖通风管制作 · tangguoqi.top</div>
</div>
</body>
</html>
