<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{width:1920px;height:1080px;overflow:hidden;font-family:'Microsoft YaHei',sans-serif;
    background:linear-gradient(135deg,#1e3a5f 0%,#2563eb 30%,#1e40af 60%,#1e3a5f 100%)}
  .center{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:30px}
  .main{font-size:96px;font-weight:900;color:#fff;text-align:center;line-height:1.2;text-shadow:0 4px 20px rgba(0,0,0,0.3)}
  .sub{font-size:42px;color:rgba(255,255,255,0.8);font-weight:400}
  .brand{font-size:32px;color:rgba(255,255,255,0.5);position:absolute;bottom:60px;left:50%;transform:translateX(-50%)}
</style>
</head>
<body>
<div class="center">
  <div class="main">技术交底不是靠吼</div>
  <div class="sub">风管厂车间检查清单是怎么建起来的</div>
</div>
<div class="brand">奇美星暖通风管制作</div>
</body>
</html>
