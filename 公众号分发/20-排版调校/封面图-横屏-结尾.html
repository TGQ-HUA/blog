<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=1920, height=1080" />
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{width:1920px;height:1080px;overflow:hidden;font-family:"Microsoft YaHei",Arial,sans-serif;color:#fff;background:#0c1222;display:flex;align-items:center;justify-content:center}
.bg{position:absolute;inset:0;background:linear-gradient(150deg,#1a2332,#0c1222,#060d18)}
.orb{position:absolute;border-radius:50%;filter:blur(90px);opacity:.3}
.o1{width:550px;height:550px;bottom:-5%;right:-10%;background:radial-gradient(circle,rgba(16,185,129,.4),transparent)}
.content{position:relative;text-align:center;max-width:1500px}
.qr{width:200px;height:200px;background:rgba(255,255,255,.1);border-radius:16px;margin:0 auto 32px;display:flex;align-items:center;justify-content:center;font-size:24px;color:#64748b}
.brand-name{font-size:44px;font-weight:700;color:#f1f5f9;margin-bottom:12px}
.brand-url{font-size:32px;color:#3b82f6;font-family:Consolas,monospace;margin-bottom:36px}
.cta{font-size:38px;color:#94a3b8;line-height:1.6}
.cta .hl{color:#f97316;font-weight:700}
</style>
</head>
<body>
<div class="bg"></div>
<div class="orb o1"></div>
<div class="content">
  <div class="qr">关注公众号</div>
  <div class="brand-name">奇美星暖通风管制作</div>
  <div class="brand-url">tangguoqi.top</div>
  <div class="cta">每周分享<span class="hl">风管厂技术实战</span>经验<br>从排版到车间，全是干货</div>
</div>
</body>
</html>
