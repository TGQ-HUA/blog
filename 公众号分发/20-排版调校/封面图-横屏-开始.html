<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=1920, height=1080" />
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{width:1920px;height:1080px;overflow:hidden;font-family:"Microsoft YaHei",Arial,sans-serif;color:#fff;background:#0c1222;display:flex;align-items:center;justify-content:center}
.bg{position:absolute;inset:0;background:linear-gradient(150deg,#1a2332,#0c1222,#060d18)}
.orb{position:absolute;border-radius:50%;filter:blur(90px);opacity:.3}
.o1{width:550px;height:550px;top:-5%;left:-10%;background:radial-gradient(circle,rgba(59,130,246,.4),transparent)}
.o2{width:420px;height:420px;top:50%;right:-5%;background:radial-gradient(circle,rgba(249,115,22,.35),transparent)}
.content{position:relative;text-align:center;max-width:1500px}
.tag{display:inline-block;background:rgba(249,115,22,.15);color:#f97316;font-size:28px;font-weight:700;padding:8px 28px;border-radius:20px;margin-bottom:32px}
.title{font-size:88px;font-weight:900;line-height:1.2;margin-bottom:20px;color:#f1f5f9}
.title .hl{color:#f97316}
.sub{font-size:42px;color:#94a3b8;line-height:1.5;margin-bottom:48px}
.brand-name{font-size:36px;font-weight:700;color:#f1f5f9}
.brand-url{font-size:30px;color:#3b82f6;font-family:Consolas,monospace;margin-top:8px}
</style>
</head>
<body>
<div class="bg"></div>
<div class="orb o1"></div>
<div class="orb o2"></div>
<div class="content">
  <div class="tag">风管厂技术实战</div>
  <div class="title">CAMduct自动排版<br>车间跑了<span class="hl">三年</span>才知道要<span class="hl">调教</span></div>
  <div class="sub">从 82% 到 89%，差的不是软件是手工调整</div>
  <div class="brand-name">奇美星暖通风管制作</div>
  <div class="brand-url">tangguoqi.top</div>
</div>
</body>
</html>
