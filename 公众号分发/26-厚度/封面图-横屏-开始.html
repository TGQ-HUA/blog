<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=1920, height=1080" />
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{width:1920px;height:1080px;overflow:hidden;font-family:"Microsoft YaHei",Arial,sans-serif;background:linear-gradient(150deg,#0f172a,#1e293b,#1e3a5f);display:flex;align-items:center;justify-content:center}
.orb{position:absolute;border-radius:50%;filter:blur(80px);opacity:.35}
.o1{width:420px;height:420px;top:8%;left:3%;background:radial-gradient(circle,rgba(37,99,235,.55),transparent)}
.o2{width:360px;height:360px;bottom:10%;right:5%;background:radial-gradient(circle,rgba(249,115,22,.5),transparent)}
.content{position:relative;text-align:center;z-index:1;padding:60px}
.main-title{font-size:96px;font-weight:900;color:#f1f5f9;line-height:1.2;margin-bottom:20px}
.main-title .hl{color:#f97316}
.sub-title{font-size:44px;color:#94a3b8;line-height:1.4;margin-bottom:40px}
.brand{font-size:30px;color:#cbd5e1}
.brand span{color:#3b82f6;font-family:Consolas,monospace}
</style>
</head>
<body>
<div class="orb o1"></div>
<div class="orb o2"></div>
<div class="content">
  <div class="main-title">风管板材<br><span class="hl">选多厚</span>才对？</div>
  <div class="sub-title">一张表搞定的事 · 车间为什么总搞错</div>
  <div class="brand">奇美星暖通风管制作 · <span>tangguoqi.top</span></div>
</div>
</body>
</html>
