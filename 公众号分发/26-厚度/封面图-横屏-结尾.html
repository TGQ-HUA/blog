<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=1920, height=1080" />
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{width:1920px;height:1080px;overflow:hidden;font-family:"Microsoft YaHei",Arial,sans-serif;background:linear-gradient(150deg,#0f172a,#1e293b,#1e3a5f);display:flex;align-items:center;justify-content:center}
.orb{position:absolute;border-radius:50%;filter:blur(80px);opacity:.35}
.o1{width:420px;height:420px;top:8%;left:3%;background:radial-gradient(circle,rgba(37,99,235,.55),transparent)}
.o2{width:360px;height:360px;bottom:10%;right:5%;background:radial-gradient(circle,rgba(16,185,129,.5),transparent)}
.content{position:relative;text-align:center;z-index:1;padding:60px}
.main-title{font-size:72px;font-weight:900;color:#f1f5f9;line-height:1.2;margin-bottom:30px}
.main-title .hl{color:#f97316}
.brand{font-size:28px;color:#cbd5e1;margin-bottom:10px}
.tagline{font-size:36px;color:#94a3b8;margin-bottom:20px}
.qr{width:120px;height:120px;background:rgba(255,255,255,.1);border-radius:12px;margin:0 auto;border:1px solid rgba(255,255,255,.2);display:flex;align-items:center;justify-content:center;color:#64748b;font-size:14px}
</style>
</head>
<body>
<div class="orb o1"></div>
<div class="orb o2"></div>
<div class="content">
  <div class="brand">奇美星暖通风管制作</div>
  <div class="main-title">把该问的<span class="hl">问清楚</span><br>比记数据重要</div>
  <div class="tagline">更多技术干货 · tangguoqi.top</div>
  <div class="qr">公众号二维码</div>
</div>
</body>
</html>
