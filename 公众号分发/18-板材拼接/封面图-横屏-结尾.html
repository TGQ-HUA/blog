<!doctype html>
<html lang="zh-CN">
<head><meta charset="UTF-8"/><meta name="viewport" content="width=1920,height=1080"/>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{width:1920px;height:1080px;overflow:hidden;font-family:"Microsoft YaHei",Arial,sans-serif;background:linear-gradient(150deg,#1e293b,#0f172a,#020617);color:#fff;display:flex;align-items:center;justify-content:center;padding:80px}
.orb1{position:absolute;width:500px;height:500px;bottom:10%;left:-8%;border-radius:50%;background:radial-gradient(circle,rgba(16,185,129,.4),transparent);filter:blur(80px)}
.orb2{position:absolute;width:400px;height:400px;top:5%;right:5%;border-radius:50%;background:radial-gradient(circle,rgba(37,99,235,.45),transparent);filter:blur(80px)}
.content{position:relative;z-index:1;text-align:center;max-width:1500px}
.tagline{display:inline-block;background:rgba(249,115,22,.15);color:#f97316;font-size:28px;font-weight:700;padding:8px 28px;border-radius:8px;margin-bottom:24px}
.summary{font-size:60px;font-weight:900;line-height:1.3;margin-bottom:20px;color:#f1f5f9}
.detail{font-size:34px;color:#94a3b8;line-height:1.5;margin-bottom:40px}
.brand .name{font-size:38px;font-weight:700;color:#f1f5f9;margin-bottom:8px}
.brand .url{color:#2563eb;font-family:Consolas,monospace;font-size:30px}
.follow{font-size:28px;color:#94a3b8;margin-top:20px}
</style>
</head>
<body>
<div class="orb1"></div>
<div class="orb2"></div>
<div class="content">
  <div class="tagline">✅ 今日干货总结</div>
  <div class="summary">展开超1250 → 拆板平咬口<br>20+20mm → 吃掉40mm料宽</div>
  <div class="detail">排板多算40mm · 现场少焊2小时</div>
  <div class="brand">
    <div class="name">奇美星暖通风管制作</div>
    <div class="url">tangguoqi.top</div>
    <div class="follow">每天学一招风管干货</div>
  </div>
</div>
</body>
</html>
