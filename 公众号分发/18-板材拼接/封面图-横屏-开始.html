<!doctype html>
<html lang="zh-CN">
<head><meta charset="UTF-8"/><meta name="viewport" content="width=1920,height=1080"/>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{width:1920px;height:1080px;overflow:hidden;font-family:"Microsoft YaHei",Arial,sans-serif;background:linear-gradient(150deg,#1e293b,#0f172a,#020617);color:#fff;display:flex;align-items:center;justify-content:center;padding:80px}
.orb1{position:absolute;width:500px;height:500px;top:5%;left:-8%;border-radius:50%;background:radial-gradient(circle,rgba(37,99,235,.5),transparent);filter:blur(80px)}
.orb2{position:absolute;width:400px;height:400px;bottom:10%;right:5%;border-radius:50%;background:radial-gradient(circle,rgba(249,115,22,.45),transparent);filter:blur(80px)}
.content{position:relative;z-index:1;text-align:center;max-width:1500px}
.title{font-size:80px;font-weight:900;line-height:1.3;margin-bottom:24px}
.sub{font-size:40px;color:#94a3b8;line-height:1.5;margin-bottom:40px}
.hl{color:#f97316}
.brand{font-size:32px;color:#64748b}
.brand .name{font-size:38px;font-weight:700;color:#f1f5f9;margin-bottom:8px}
.brand .url{color:#2563eb;font-family:Consolas,monospace;font-size:30px}
</style>
</head>
<body>
<div class="orb1"></div>
<div class="orb2"></div>
<div class="content">
  <div class="title">风管板材拼接<br><span class="hl">钢卷只有1250mm宽</span><br>大截面风管怎么做？</div>
  <div class="sub">GB50243规范解读 · 平咬口拼接参数 · 车间实操指南</div>
  <div class="brand">
    <div class="name">奇美星暖通风管制作</div>
    <div class="url">tangguoqi.top</div>
  </div>
</div>
</body>
</html>
