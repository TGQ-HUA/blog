<!doctype html>
<html lang="zh-CN">
<head><meta charset="UTF-8"/><meta name="viewport" content="width=1920,height=1080"/><title>封面-结尾</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{width:1920px;height:1080px;overflow:hidden;font-family:"Microsoft YaHei",Arial,sans-serif;background:linear-gradient(150deg,#0f172a,#1e293b)}
.orb{position:absolute;border-radius:50%;filter:blur(80px);opacity:.3}
.o1{width:500px;height:500px;top:5%;left:2%;background:radial-gradient(circle,rgba(37,99,235,.6),transparent)}
.o2{width:400px;height:400px;top:55%;right:5%;background:radial-gradient(circle,rgba(16,185,129,.5),transparent)}
.content{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:60px}
.title{font-size:80px;font-weight:900;color:#f8fafc;line-height:1.2}
.title .hl{color:#f97316}
.title .r{color:#ef4444}
.sub{font-size:36px;color:#94a3b8;margin-top:24px;line-height:1.6}
.brand{margin-top:50px;padding:24px 44px;background:rgba(255,255,255,.06);border-radius:16px}
.brand .n{font-size:32px;color:#f8fafc;font-weight:700}
.brand .u{font-size:26px;color:#60a5fa;font-family:Consolas,monospace;margin-top:6px}
.qr-hint{font-size:22px;color:#64748b;margin-top:20px}
</style>
</head>
<body>
<div class="orb o1"></div><div class="orb o2"></div>
<div class="content">
  <div class="title">技术规范再全<br><span class="r">车间的人看不见</span> = <span class="hl">白写</span></div>
  <div class="sub">咬口选型 · 车间实操 · 风管手艺<br>更多干货 → tangguoqi.top</div>
  <div class="brand">
    <div class="n">奇美星暖通风管制作</div>
    <div class="u">tangguoqi.top</div>
  </div>
  <div class="qr-hint">关注奇美星 · 风管技术不迷路</div>
</div>
</body>
</html>
