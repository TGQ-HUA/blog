<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1920,height=1080">
  <title>封面-结尾</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      width: 1920px; height: 1080px;
      background: linear-gradient(135deg, #0d1117 0%, #161b22 50%, #0d1117 100%);
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
      color: #f0f6fc; text-align: center; padding: 80px;
    }
    .accent { width: 80px; height: 3px; background: #58a6ff; border-radius: 2px; margin-bottom: 30px; }
    .brand { font-size: 48px; font-weight: 700; margin-bottom: 20px; }
    .url { font-size: 28px; color: #484f58; }
    .tagline { font-size: 32px; color: #7d8590; margin-top: 30px; }
  </style>
</head>
<body>
  <div class="accent"></div>
  <div class="brand">奇美星暖通风管制作</div>
  <div class="url">tangguoqi.top</div>
  <div class="tagline">好风管，从细节做起</div>
</body>
</html>
