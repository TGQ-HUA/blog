<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1920,height=1080">
  <title>封面-开始</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      width: 1920px; height: 1080px;
      background: linear-gradient(135deg, #0d1117 0%, #161b22 50%, #0d1117 100%);
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
      color: #f0f6fc; text-align: center; padding: 80px;
    }
    .accent { width: 120px; height: 4px; background: #58a6ff; border-radius: 2px; margin-bottom: 40px; }
    h1 { font-size: 88px; font-weight: 900; line-height: 1.3; margin-bottom: 20px; }
    .sub { font-size: 38px; color: #7d8590; line-height: 1.5; }
    .brand { position: absolute; bottom: 60px; font-size: 24px; color: #484f58; letter-spacing: 4px; }
  </style>
</head>
<body>
  <div class="accent"></div>
  <h1>法兰垫片</h1>
  <div class="sub">几毛钱的东西，装错了整条风管都在漏</div>
  <div class="brand">奇美星暖通风管制作</div>
</body>
</html>
