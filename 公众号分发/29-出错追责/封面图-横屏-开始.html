<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=1920, height=1080" />
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{width:1920px;height:1080px;overflow:hidden;font-family:"Microsoft YaHei",Arial,sans-serif;display:flex;align-items:center;justify-content:center;background:linear-gradient(150deg,#1e293b,#0f172a);position:relative}
.orb{position:absolute;border-radius:50%;filter:blur(80px);opacity:.35}
.o1{width:500px;height:500px;top:5%;left:-8%;background:radial-gradient(circle,rgba(37,99,235,.7),transparent)}
.o2{width:400px;height:400px;bottom:10%;right:5%;background:radial-gradient(circle,rgba(249,115,22,.5),transparent)}
.o3{width:300px;height:300px;top:60%;left:45%;background:radial-gradient(circle,rgba(16,185,129,.4),transparent)}
.content{text-align:center;z-index:1;padding:60px}
.tag{display:inline-block;background:rgba(220,38,38,.8);color:#fff;font-size:28px;font-weight:700;padding:8px 24px;border-radius:6px;margin-bottom:30px}
.title{font-size:76px;font-weight:900;color:#fff;line-height:1.3;margin-bottom:20px}
.title .hl{background:linear-gradient(135deg,#f97316,#dc2626);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.sub{font-size:32px;color:#94a3b8;line-height:1.6}
.brand{position:absolute;bottom:50px;left:50%;transform:translateX(-50%);text-align:center}
.brand .bn{font-size:22px;color:#64748b;font-weight:600}
.brand .bu{font-size:18px;color:#475569;font-family:Consolas,monospace;margin-top:4px}
</style>
</head>
<body>
<div class="orb o1"></div>
<div class="orb o2"></div>
<div class="orb o3"></div>
<div class="content">
  <div class="tag">⚡ 管理实战</div>
  <div class="title">同一个错犯了三次<br><span class="hl">我才决定自己写个系统管起来</span></div>
  <div class="sub">风管厂出错追责 · 从"你说是谁干的"到"数据库说就是你"</div>
</div>
<div class="brand">
  <div class="bn">奇美星暖通风管制作</div>
  <div class="bu">tangguoqi.top</div>
</div>
</body>
</html>
