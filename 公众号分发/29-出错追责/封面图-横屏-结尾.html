<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=1920, height=1080" />
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{width:1920px;height:1080px;overflow:hidden;font-family:"Microsoft YaHei",Arial,sans-serif;display:flex;align-items:center;justify-content:center;background:linear-gradient(150deg,#0f172a,#1e293b);position:relative}
.orb{position:absolute;border-radius:50%;filter:blur(80px);opacity:.3}
.o1{width:450px;height:450px;top:15%;right:-5%;background:radial-gradient(circle,rgba(249,115,22,.6),transparent)}
.o2{width:300px;height:300px;bottom:20%;left:10%;background:radial-gradient(circle,rgba(37,99,235,.5),transparent)}
.content{text-align:center;z-index:1;padding:60px}
.quote{font-size:54px;font-weight:900;color:#fff;line-height:1.4;margin-bottom:50px}
.quote .hl{background:linear-gradient(135deg,#f97316,#dc2626);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.brand{text-align:center}
.brand .bn{font-size:32px;color:#e2e8f0;font-weight:700}
.brand .bu{font-size:24px;color:#2563eb;font-family:Consolas,monospace;margin-top:8px}
.brand .cta{margin-top:30px;font-size:24px;color:#64748b}
</style>
</head>
<body>
<div class="orb o1"></div>
<div class="orb o2"></div>
<div class="content">
  <div class="quote">出错不可怕<br>可怕的是<span class="hl">同一个错犯第三次</span></div>
  <div class="brand">
    <div class="bn">奇美星暖通风管制作</div>
    <div class="bu">tangguoqi.top</div>
    <div class="cta">📖 更多暖通风管实战干货 → 关注我们</div>
  </div>
</div>
</body>
</html>
