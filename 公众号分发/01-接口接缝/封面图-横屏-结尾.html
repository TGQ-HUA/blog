<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=1080, height=1920" />
<title>封面-结尾</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{width:1080px;height:1920px;overflow:hidden;margin:0;font-family:'Microsoft YaHei',sans-serif;display:flex;align-items:center;justify-content:center;background:linear-gradient(150deg,#d4e8ff 0%,#ddd4ff 25%,#d4f0ff 50%,#e4d8f8 75%,#d4e8ff 100%)}
  .orb{position:absolute;border-radius:50%;filter:blur(60px);opacity:0.42}
  .orb-1{width:420px;height:420px;background:radial-gradient(circle,#60a5fa,transparent);top:-120px;left:-100px}
  .orb-2{width:350px;height:350px;background:radial-gradient(circle,#c084fc,transparent);top:600px;right:-80px}
  .orb-3{width:300px;height:300px;background:radial-gradient(circle,#f97316,transparent);bottom:200px;left:-80px}
  .card{background:rgba(255,255,255,0.22);backdrop-filter:blur(20px) saturate(180%);border:1px solid rgba(255,255,255,0.35);border-radius:22px;padding:80px 60px;text-align:center;max-width:900px;z-index:1}
  .qr{width:200px;height:200px;background:rgba(255,255,255,0.5);border-radius:16px;margin:0 auto 30px;display:flex;align-items:center;justify-content:center;font-size:24px;color:#94a3b8}
  .brand{font-size:42px;font-weight:800;color:#1e3a5f;margin-bottom:12px}
  .url{font-size:32px;color:#2563eb;font-weight:600;margin-bottom:16px}
  .cta{font-size:30px;color:#64748b}
</style>
</head>
<body>
<div class="orb orb-1"></div><div class="orb orb-2"></div><div class="orb orb-3"></div>
<div class="card">
  <div class="qr">📱 扫码关注</div>
  <div class="brand">奇美星暖通风管制作</div>
  <div class="url">tangguoqi.top</div>
  <div class="cta">每周一篇风管制造实战干货</div>
</div>
</body>
</html>
