<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=1920, height=1080" />
<script src="gsap.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{width:1920px;height:1080px;overflow:hidden;font-family:"Microsoft YaHei",Arial,sans-serif}
.bg{position:absolute;inset:0;background:linear-gradient(150deg,#eff6ff,#f0f9ff,#eef2ff)}
.orb{position:absolute;border-radius:50%;filter:blur(70px);opacity:.4}
.o1{width:450px;height:450px;top:5%;left:3%;background:radial-gradient(circle,rgba(37,99,235,.5),transparent)}
.o2{width:380px;height:380px;top:45%;right:5%;background:radial-gradient(circle,rgba(99,102,241,.4),transparent)}
.o3{width:320px;height:320px;bottom:5%;left:35%;background:radial-gradient(circle,rgba(37,99,235,.35),transparent)}
.card{position:absolute;inset:0;display:flex;align-items:center;padding:80px 100px}
.left{flex:1.2;display:flex;flex-direction:column;justify-content:center}
.tag{display:inline-block;background:#2563eb;color:#fff;font-size:28px;font-weight:700;padding:10px 28px;border-radius:10px;margin-bottom:36px;width:fit-content}
.title{font-size:80px;color:#0f172a;font-weight:900;line-height:1.2;margin-bottom:24px}
.title .accent{color:#2563eb}
.sub{font-size:38px;color:#64748b;line-height:1.5;margin-bottom:40px}
.points{list-style:none}
.points li{font-size:34px;color:#475569;padding:10px 0;display:flex;align-items:center;gap:16px}
.points li .dot{width:10px;height:10px;background:#2563eb;border-radius:50%;flex-shrink:0}
.brand{position:absolute;bottom:40px;left:100px;font-size:30px;color:#64748b;font-weight:600}
.brand .url{color:#2563eb;margin-left:20px;font-size:26px}
</style>
</head>
<body>
<div id="root" class="clip" data-composition-id="main" data-start="0" data-duration="1" data-width="1920" data-height="1080">
  <div class="bg"></div>
  <div class="orb o1"></div>
  <div class="orb o2"></div>
  <div class="orb o3"></div>
  <div class="card">
    <div class="left">
      <div class="tag">🖥️ 技术管理</div>
      <div class="title">老师傅的经验<br><span class="accent">怎么变成系统</span></div>
      <div class="sub">风管厂技术部数字化踩坑记 — 从文档到Excel到WPS宏</div>
      <ul class="points">
        <li><span class="dot"></span>核心技术为什么总在师傅脑子里？</li>
        <li><span class="dot"></span>三个方案的失败与迭代</li>
        <li><span class="dot"></span>弯头返工 8%→2%，新人上手 两周→三天</li>
      </ul>
    </div>
  </div>
  <div class="brand">奇美星暖通风管制作<span class="url">tangguoqi.top</span></div>
</div>
</body>
</html>
