<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=1920, height=1080" />
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{width:1920px;height:1080px;overflow:hidden;font-family:"Microsoft YaHei",Arial,sans-serif}
.bg{position:absolute;inset:0;background:linear-gradient(150deg,#eff6ff,#f0f9ff,#eef2ff)}
.orb{position:absolute;border-radius:50%;filter:blur(70px);opacity:.4}
.o1{width:450px;height:450px;top:5%;left:3%;background:radial-gradient(circle,rgba(37,99,235,.5),transparent)}
.o2{width:380px;height:380px;top:45%;right:5%;background:radial-gradient(circle,rgba(99,102,241,.4),transparent)}
.o3{width:320px;height:320px;bottom:5%;left:35%;background:radial-gradient(circle,rgba(37,99,235,.35),transparent)}
.card{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;gap:80px;padding:80px}
.mid{text-align:center}
.mid .t{font-size:64px;font-weight:900;color:#0f172a;line-height:1.3;margin-bottom:16px}
.mid .t .accent{color:#2563eb}
.mid .s{font-size:38px;color:#64748b;margin-bottom:40px}
.right-col{text-align:center}
.qr-box{width:240px;height:240px;background:#fff;border-radius:20px;padding:14px;box-shadow:0 8px 32px rgba(37,99,235,.12);margin-bottom:16px}
.qr-box img{width:100%;height:100%;object-fit:contain;border-radius:10px}
.qr-label{font-size:26px;color:#64748b;margin-bottom:6px}
.qr-name{font-size:30px;color:#2563eb;font-weight:700;margin-bottom:12px}
.blog-url{font-size:26px;color:#64748b;font-family:Consolas,monospace;background:rgba(37,99,235,.08);padding:10px 24px;border-radius:24px}
.brand{position:absolute;bottom:40px;left:80px;font-size:28px;color:#64748b;font-weight:600}
</style>
</head>
<body>
<div id="root" class="clip" data-composition-id="main" data-start="0" data-duration="1" data-width="1920" data-height="1080">
  <div class="bg"></div>
  <div class="orb o1"></div>
  <div class="orb o2"></div>
  <div class="orb o3"></div>
  <div class="card">
    <div class="mid">
      <div class="t">更多风管制造干货<br><span class="accent">每周更新</span></div>
      <div class="s">弯头·大小头·S弯·法兰·保温棉<br>工艺规范 · CAMduct · WPS宏</div>
    </div>
    <div class="right-col">
      <div class="qr-label">扫码关注公众号</div>
      <div class="qr-box"><img src="../公众号二维码.jpg" alt="二维码"></div>
      <div class="qr-name">奇美星暖通风管制作</div>
      <div class="blog-url">tangguoqi.top</div>
    </div>
  </div>
  <div class="brand">奇美星暖通风管制作</div>
</div>
</body>
</html>
